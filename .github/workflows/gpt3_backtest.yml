name: GPT3 Backtest

on:
  workflow_dispatch:
    inputs:
      dt_from:
        description: 'Od kiedy UTC (np. "2026-03-25 00:00")'
        type: string
        default: ''
      dt_to:
        description: 'Do kiedy UTC (np. "2026-03-28 00:00"). Puste = teraz'
        type: string
        default: ''
      hours:
        description: 'Ile godzin wstecz (tylko gdy brak --from)'
        type: number
        default: 48
      sheet_suffix:
        description: 'Sufiks nazwy arkusza (np. "v2" → "GPT3 test v2"). Puste = "GPT3 test"'
        type: string
        default: ''

jobs:
  gpt3-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zaleznosci
        run: pip install -r requirements.txt

      - name: Uruchom GPT3 backtest
        env:
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          ARGS=""
          [ -n "${{ inputs.dt_from }}" ] && ARGS="$ARGS --from '${{ inputs.dt_from }}'"
          [ -n "${{ inputs.dt_to }}" ]   && ARGS="$ARGS --to '${{ inputs.dt_to }}'"
          [ -n "${{ inputs.hours }}" ] && [ -z "${{ inputs.dt_from }}" ] && ARGS="$ARGS --hours ${{ inputs.hours }}"
          [ -n "${{ inputs.sheet_suffix }}" ] && ARGS="$ARGS --sheet-suffix '${{ inputs.sheet_suffix }}'"
          eval python gpt3_backtest.py $ARGS
