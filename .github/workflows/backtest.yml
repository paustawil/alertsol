name: Backtest SOL 22.03.2026

on:
  workflow_dispatch:
    inputs:
      no_llm:
        description: 'Pomiń Claude i GPT (tylko algorytm)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zaleznosci
        run: pip install -r requirements.txt

      - name: Uruchom backtest
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          if [ "${{ github.event.inputs.no_llm }}" = "true" ]; then
            python backtest.py --no-llm
          else
            python backtest.py
          fi
