name: Backtest SOL 16-20.03.2026

on:
  workflow_dispatch:
    inputs:
      session:
        description: 'Sesja'
        required: false
        default: 'full'
        type: choice
        options: ['full', 'morning', 'afternoon']
      reset:
        description: 'Wyczyść arkusz przed zapisem'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']
      no_llm:
        description: 'Pomiń Claude i GPT (tylko algorytm)'
        required: false
        default: 'false'
        type: choice
        options: ['false', 'true']

jobs:
  backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zaleznosci
        run: pip install -r requirements.txt

      - name: Uruchom backtest
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          ARGS="--session ${{ github.event.inputs.session }}"
          [ "${{ github.event.inputs.reset }}"  = "true" ] && ARGS="$ARGS --reset"
          [ "${{ github.event.inputs.no_llm }}" = "true" ] && ARGS="$ARGS --no-llm"
          python backtest.py $ARGS
