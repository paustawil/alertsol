name: Grok2 Backtest (Grok vs Grok2)

on:
  workflow_dispatch:
    inputs:
      grok2_only:
        description: 'Pomiń stary Grok — testuj tylko Grok2 (oszczędność kredytów)'
        type: boolean
        default: true
      hours:
        description: 'Ile godzin wstecz testować'
        type: number
        default: 48
      end_offset:
        description: 'Offset końca w godzinach od teraz (np. 48 = pomiń ostatnie 48h)'
        type: number
        default: 0
      sheet_suffix:
        description: 'Sufiks nazwy arkusza (np. "v2" → "Grok2 test v2")'
        type: string
        default: ''

jobs:
  grok2-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zaleznosci
        run: pip install -r requirements.txt

      - name: Uruchom Grok2 backtest
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          XAI_API_KEY:        ${{ secrets.XAI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          ARGS="--hours ${{ inputs.hours }} --end-offset ${{ inputs.end_offset }}"
          [ "${{ inputs.grok2_only }}" = "true" ] && ARGS="$ARGS --grok2-only"
          [ -n "${{ inputs.sheet_suffix }}" ] && ARGS="$ARGS --sheet-suffix '${{ inputs.sheet_suffix }}'"
          python grok2_backtest.py $ARGS
