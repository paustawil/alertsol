name: Grok2 Backtest (Grok vs Grok2 — 48h porównanie)

on:
  workflow_dispatch:
    inputs:
      grok2_only:
        description: 'Pomiń stary Grok — testuj tylko Grok2 (oszczędność kredytów)'
        type: boolean
        default: false

jobs:
  grok2-backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zaleznosci
        run: pip install -r requirements.txt

      - name: Uruchom Grok2 backtest
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          XAI_API_KEY:        ${{ secrets.XAI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          ARGS=""
          [ "${{ inputs.grok2_only }}" = "true" ] && ARGS="$ARGS --grok2-only"
          python grok2_backtest.py $ARGS
