name: Grok2 Backtest

on:
  workflow_dispatch:
    inputs:
      grok2_only:
        description: 'Pomiń stary Grok — testuj tylko Grok2'
        type: boolean
        default: true
      gpt_trend:
        description: 'Testuj GPT-4o z nowym promptem trendowym (zamiast Groka)'
        type: boolean
        default: false
      dt_from:
        description: 'Od kiedy UTC (np. "2026-03-25 00:00")'
        type: string
        default: ''
      dt_to:
        description: 'Do kiedy UTC (np. "2026-03-28 00:00"). Puste = teraz'
        type: string
        default: ''
      hours:
        description: 'Ile godzin wstecz (tylko gdy brak --from)'
        type: number
        default: 48
      sheet_suffix:
        description: 'Sufiks nazwy arkusza (np. "pre" → "Grok2 test pre")'
        type: string
        default: ''

jobs:
  grok2-backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zaleznosci
        run: pip install -r requirements.txt

      - name: Uruchom Grok2 backtest
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          XAI_API_KEY:        ${{ secrets.XAI_API_KEY }}
          OPENAI_API_KEY:     ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          ARGS=""
          [ "${{ inputs.gpt_trend }}" = "true" ] && ARGS="$ARGS --gpt-trend"
          [ "${{ inputs.grok2_only }}" = "true" ] && ARGS="$ARGS --grok2-only"
          [ -n "${{ inputs.dt_from }}" ] && ARGS="$ARGS --from '${{ inputs.dt_from }}'"
          [ -n "${{ inputs.dt_to }}" ] && ARGS="$ARGS --to '${{ inputs.dt_to }}'"
          [ -n "${{ inputs.hours }}" ] && [ -z "${{ inputs.dt_from }}" ] && ARGS="$ARGS --hours ${{ inputs.hours }}"
          [ -n "${{ inputs.sheet_suffix }}" ] && ARGS="$ARGS --sheet-suffix '${{ inputs.sheet_suffix }}'"
          eval python grok2_backtest.py $ARGS
