name: Diagnose Regime

on:
  workflow_dispatch:
    inputs:
      dt_from:
        description: 'Od kiedy UTC (np. "2025-07-01 00:00")'
        type: string
        default: '2025-07-01 00:00'
      dt_to:
        description: 'Do kiedy UTC (np. "2025-10-01 00:00")'
        type: string
        default: '2025-10-01 00:00'
      source:
        description: 'Źródło danych (auto/binance/bitget)'
        type: choice
        options:
          - auto
          - binance
          - bitget
        default: 'auto'
      test_filters:
        description: 'Testuj warianty filtrów trend_consolidation'
        type: boolean
        default: false

jobs:
  diagnose:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zaleznosci
        run: pip install requests

      - name: Uruchom diagnostyke
        run: |
          FLAGS=""
          if [ "${{ inputs.test_filters }}" = "true" ]; then
            FLAGS="--test-filters"
          fi
          python diagnose_regime.py --from '${{ inputs.dt_from }}' --to '${{ inputs.dt_to }}' --source '${{ inputs.source }}' $FLAGS
