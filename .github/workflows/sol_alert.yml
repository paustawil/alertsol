name: SOL Alert

on:
  schedule:
    - cron: '*/15 * * * *'   # Co 15 minut
  workflow_dispatch:           # Ręczne uruchomienie (przycisk w GitHub)

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Przywroc dane (anty-spam + tracking)
        uses: actions/cache/restore@v4
        with:
          path: |
            last_alert.json
            pending_setups.json
            setup_log.csv
          key: sol-alert-data

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zależności
        run: pip install -r requirements.txt

      - name: Uruchom analizę
        env:
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python sol_alert.py

      - name: Zapisz dane (anty-spam + tracking)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            last_alert.json
            pending_setups.json
            setup_log.csv
          key: sol-alert-data
