name: SOL Alert

on:
  schedule:
    - cron: '*/15 * * * *'   # Backup: GitHub schedule (może być opóźniony)
  workflow_dispatch:           # Ręczne uruchomienie (przycisk w GitHub)
  repository_dispatch:         # Trigger z zewnętrznego crona (cron-job.org)
    types: [sol-alert-trigger]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Przywroc dane (anty-spam + tracking)
        uses: actions/cache/restore@v4
        with:
          path: |
            last_alerts.json
            pending_setups.json
          key: sol-alert-data-${{ github.run_id }}
          restore-keys: sol-alert-data

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zaleznosci
        run: pip install -r requirements.txt

      - name: Uruchom analize
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: python sol_alert.py

      - name: Zapisz dane (anty-spam + tracking)
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            last_alerts.json
            pending_setups.json
          key: sol-alert-data-${{ github.run_id }}
