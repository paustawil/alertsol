name: SOL Alert

on:
  workflow_dispatch:           # Ręczne uruchomienie (przycisk w GitHub)
    inputs:
      reset:
        description: 'Wyczyść arkusze Alerty i Wyniki przed startem'
        type: boolean
        default: false
  repository_dispatch:         # Trigger z cron-job.org (co 15 min)
    types: [sol-alert-trigger]

jobs:
  analyze:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zaleznosci
        run: pip install -r requirements.txt

      - name: Uruchom analize
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          XAI_API_KEY:       ${{ secrets.XAI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
          BITGET_API_KEY:    ${{ secrets.BITGET_API_KEY }}
          BITGET_API_SECRET: ${{ secrets.BITGET_API_SECRET }}
          BITGET_PASSPHRASE: ${{ secrets.BITGET_PASSPHRASE }}
          BITGET_DEMO:       ${{ secrets.BITGET_DEMO }}
          BITGET_TRADE_USDT: ${{ secrets.BITGET_TRADE_USDT }}
        run: python sol_alert.py ${{ inputs.reset == true && '--reset' || '' }}

      - name: Zapisz stan do repozytorium
        if: always()
        run: |
          git config user.name "SOL Alert Bot"
          git config user.email "bot@alertsol.com"
          git add last_alerts.json pending_setups.json setup_counter.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: update alert state [skip ci]"
          git push || true
