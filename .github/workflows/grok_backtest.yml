name: Grok Backtest (historyczny 26.03.2026)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Tylko wydrukuj wyniki — nie zapisuj do arkusza'
        type: boolean
        default: false
      results_only:
        description: 'Pomiń wstawianie do Alerty (przy ponownym uruchomieniu)'
        type: boolean
        default: false

jobs:
  grok-backtest:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Ustaw Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Zainstaluj zaleznosci
        run: pip install -r requirements.txt

      - name: Uruchom Grok backtest
        env:
          TELEGRAM_TOKEN:     ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
          XAI_API_KEY:        ${{ secrets.XAI_API_KEY }}
          GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        run: |
          ARGS=""
          [ "${{ inputs.dry_run }}" = "true" ]      && ARGS="$ARGS --dry-run"
          [ "${{ inputs.results_only }}" = "true" ] && ARGS="$ARGS --results-only"
          python grok_backtest.py $ARGS

      - name: Zapisz pending_setups.json do repozytorium
        if: ${{ inputs.dry_run != true }}
        run: |
          git config user.name "SOL Alert Bot"
          git config user.email "bot@alertsol.com"
          git add pending_setups.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "chore: grok backtest — update pending setups [skip ci]"
          git push || true
