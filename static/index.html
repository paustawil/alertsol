<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AlertSol Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --bg0:#080d14; --bg1:#0d1520; --bg2:#121c2e; --bg3:#182336; --bg4:#1e2a3e;
  --border:#1a2840; --border2:#223050;
  --text1:#e8edf5; --text2:#8a9bbf; --text3:#6b7fa3;
  --green:#00d68f; --green-dim:#00d68f18;
  --red:#ff4d6a; --red-dim:#ff4d6a18;
  --amber:#f5a623; --amber-dim:#f5a62318;
  --blue:#4a9eff; --blue-dim:#4a9eff18;
  --mono:'IBM Plex Mono',monospace; --sans:'IBM Plex Sans',sans-serif;
  --sidebar-w:220px; --topbar-h:58px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:var(--bg0);font-family:var(--sans);color:var(--text1);height:100dvh;overflow:hidden}
.green{color:var(--green)} .red{color:var(--red)} .amber{color:var(--amber)} .dim{color:var(--text2)} .mono{font-family:var(--mono)}
.kier-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.06em;padding:2px 8px;border-radius:3px}
.kier-badge.long{background:var(--green-dim);color:var(--green);border:1px solid #00d68f33}
.kier-badge.short{background:var(--red-dim);color:var(--red);border:1px solid #ff4d6a33}
.status-pill{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);padding:2px 8px;border-radius:10px}
.status-pill.czeka{background:var(--amber-dim);color:var(--amber);border:1px solid #f5a62333}
.status-pill.short,.status-pill.short{background:var(--red-dim);color:var(--red);border:1px solid #ff4d6a33}
.status-pill.pozycja{background:var(--blue-dim);color:var(--blue);border:1px solid #4a9eff33}
.status-pill.po_tp1{background:var(--green-dim);color:var(--green);border:1px solid #00d68f33}
.status-dot{width:5px;height:5px;border-radius:50%;background:currentColor;display:inline-block}
.action-btn{display:inline-flex;align-items:center;gap:4px;font-size:10px;font-weight:600;padding:3px 10px;border-radius:3px;border:none;cursor:pointer;font-family:var(--mono);letter-spacing:.04em;transition:opacity .15s}
.action-btn:hover{opacity:.8}
.action-btn.red{background:var(--red-dim);color:var(--red);border:1px solid #ff4d6a33}
.action-btn.green{background:var(--green-dim);color:var(--green);border:1px solid #00d68f33}
.action-btn.gray{background:var(--bg3);color:var(--text2);border:1px solid var(--border2)}
.seg-tabs{display:flex;background:var(--bg3);border-radius:5px;padding:2px;border:1px solid var(--border2)}
.seg-tab{padding:4px 10px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;border-radius:3px;font-family:var(--mono);transition:all .15s}
.seg-tab.active{background:var(--bg1);color:var(--text1);border:1px solid var(--border2)}
.filter-chips{display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{padding:3px 10px;border-radius:10px;font-size:10px;font-weight:500;border:1px solid var(--border2);color:var(--text2);background:var(--bg2);cursor:pointer;transition:all .15s;font-family:var(--mono);white-space:nowrap}
.filter-chip.active{background:var(--bg3);color:var(--text1);border-color:var(--blue)}
.filter-chip:hover{border-color:var(--text3)}
.panel{background:var(--bg1);border:1px solid var(--border);border-radius:8px;overflow:hidden;display:flex;flex-direction:column}
.panel-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);background:var(--bg2);flex-shrink:0}
.panel-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text2)}
.panel-right{display:flex;align-items:center;gap:8px}
.panel-badge{font-family:var(--mono);font-size:10px;background:var(--bg3);color:var(--text2);padding:2px 8px;border-radius:8px;border:1px solid var(--border2)}
.panel-body{flex:1;overflow:hidden}
.scroll-y{overflow-y:auto}
.scroll-y::-webkit-scrollbar{width:3px}
.scroll-y::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.tbl{width:100%;border-collapse:collapse;font-size:12px}
.tbl th{background:var(--bg2);color:var(--text3);font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:8px 12px;text-align:left;border-bottom:1px solid var(--border);white-space:nowrap}
.tbl td{padding:9px 12px;border-bottom:1px solid var(--border);vertical-align:middle}
.tbl tr:last-child td{border-bottom:none}
.tbl tr:hover td{background:var(--bg2)}
/* ── Desktop layout ── */
.d-root{display:flex;width:100%;height:100dvh}
.sidebar{width:var(--sidebar-w);height:100dvh;background:var(--bg1);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0}
.sidebar-logo{padding:20px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-brand{font-size:13px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--text1)}
.sidebar-sub{font-size:10px;color:var(--text3);margin-top:2px;font-family:var(--mono)}
.sidebar-price-block{padding:16px 20px;border-bottom:1px solid var(--border)}
.sidebar-price{font-family:var(--mono);font-size:26px;font-weight:600;color:var(--text1);line-height:1}
.sidebar-change{font-family:var(--mono);font-size:12px;color:var(--red);margin-left:6px}
.sidebar-pair{font-size:10px;color:var(--text3);margin-top:4px;font-family:var(--mono)}
.regime-badge{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.08em;padding:3px 9px;border-radius:3px;text-transform:uppercase;margin-top:8px}
.regime-badge.down{background:var(--red-dim);color:var(--red);border:1px solid #ff4d6a33}
.regime-badge.up{background:var(--green-dim);color:var(--green);border:1px solid #00d68f33}
.sidebar-nav{padding:12px 0;flex:1}
.nav-group-label{font-size:9px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);padding:8px 20px 4px}
.d-nav-item{display:flex;align-items:center;gap:10px;padding:9px 20px;font-size:13px;font-weight:500;color:var(--text2);cursor:pointer;transition:all .15s;border-left:2px solid transparent}
.d-nav-item:hover{background:var(--bg2);color:var(--text1)}
.d-nav-item.active{background:var(--blue-dim);color:var(--blue);border-left-color:var(--blue)}
.d-nav-icon{width:16px;height:16px;flex-shrink:0}
.nav-badge{margin-left:auto;font-family:var(--mono);font-size:10px;background:var(--amber-dim);color:var(--amber);border:1px solid #f5a62333;padding:1px 6px;border-radius:8px}
.sidebar-bottom{padding:16px 20px;border-top:1px solid var(--border)}
.sidebar-date{font-family:var(--mono);font-size:11px;color:var(--text3)}
.d-main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.d-topbar{height:var(--topbar-h);background:var(--bg1);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:0;flex-shrink:0}
.stat-cell{padding:0 24px 0 0;margin-right:24px;border-right:1px solid var(--border)}
.stat-cell:last-of-type{border-right:none}
.stat-val{font-family:var(--mono);font-size:16px;font-weight:600;line-height:1;margin-bottom:2px}
.stat-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.topbar-alert{margin-left:auto;background:var(--amber-dim);border:1px solid #f5a62333;border-radius:5px;padding:6px 14px;font-size:11px;color:var(--amber);font-family:var(--mono);max-width:420px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-content{flex:1;overflow-y:auto;overflow-x:hidden;padding:20px 24px;display:flex;flex-direction:column;gap:20px}
.d-content::-webkit-scrollbar{width:4px}
.d-content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.row-top{display:grid;grid-template-columns:1fr 340px;gap:16px}
.quick-stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:0}
.qs-cell{padding:16px;border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.qs-cell:nth-child(2n){border-right:none}
.qs-cell:nth-last-child(-n+2){border-bottom:none}
.qs-val{font-family:var(--mono);font-size:20px;font-weight:600;line-height:1;margin-bottom:4px}
.qs-lbl{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.chart-wrap-d{padding:12px;height:100%;min-height:200px}
.chart-inner{width:100%;height:100%;background:var(--bg2);border:1px solid var(--border);border-radius:6px;position:relative;overflow:hidden}
.chart-label{position:absolute;top:8px;left:10px;font-size:10px;color:var(--text3);font-family:var(--mono);z-index:2}
/* ── Mobile layout ── */
.m-root{display:flex;justify-content:center;align-items:flex-start;width:100%;height:100dvh;overflow:hidden}
.phone-wrap{width:100%;max-width:390px;height:100dvh;background:var(--bg0);display:flex;flex-direction:column;position:relative;overflow:hidden}
.m-topbar{background:var(--bg1);border-bottom:1px solid var(--border);padding:14px 16px 12px;flex-shrink:0}
.topbar-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.topbar-brand{font-size:11px;font-weight:600;letter-spacing:.12em;color:var(--text2);text-transform:uppercase}
.topbar-date{font-family:var(--mono);font-size:11px;color:var(--text2)}
.topbar-row2{display:flex;align-items:flex-end;justify-content:space-between}
.topbar-price{font-family:var(--mono);font-size:32px;font-weight:600;color:var(--text1);line-height:1}
.topbar-change{font-family:var(--mono);font-size:13px;color:var(--red);margin-left:8px}
.topbar-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px}
.topbar-pair{font-size:11px;color:var(--text3);font-family:var(--mono)}
.m-regime{font-size:11px;font-weight:700;letter-spacing:.08em;padding:3px 9px;border-radius:3px;text-transform:uppercase}
.m-regime.down{background:var(--red-dim);color:var(--red);border:1px solid #ff4d6a44}
.m-regime.up{background:var(--green-dim);color:var(--green);border:1px solid #00d68f44}
.stats-strip{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0}
.m-stat-cell{flex:1;padding:10px 8px;text-align:center;border-right:1px solid var(--border)}
.m-stat-cell:last-child{border-right:none}
.m-stat-val{font-family:var(--mono);font-size:14px;font-weight:600;line-height:1;margin-bottom:3px}
.m-stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.scroll-area{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:16px}
.scroll-area::-webkit-scrollbar{display:none}
.sec-header{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 8px;border-bottom:1px solid var(--border)}
.sec-title{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--text2)}
.sec-badge{font-family:var(--mono);font-size:11px;background:var(--bg3);color:var(--text2);padding:2px 8px;border-radius:10px;border:1px solid var(--border2)}
.alert-banner{background:var(--amber-dim);border-top:1px solid #f5a62344;border-bottom:1px solid #f5a62344;padding:9px 12px;font-size:11px;color:var(--amber);font-family:var(--mono);line-height:1.5}
.chart-wrap-m{margin:0 12px 4px;background:var(--bg1);border:1px solid var(--border);border-radius:6px;height:260px;position:relative;overflow:hidden}
.chart-label-m{position:absolute;top:8px;left:10px;font-size:10px;color:var(--text3);font-family:var(--mono);z-index:2}
.setup-card{margin:0 12px 8px;background:var(--bg1);border:1px solid var(--border);border-radius:8px;overflow:hidden}
.setup-card-top{padding:10px 12px 8px;border-bottom:1px solid var(--border)}
.setup-card-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.setup-id{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text1)}
.setup-typ{font-size:11px;color:var(--text2)}
.setup-card-bottom{display:flex;padding:8px 12px;gap:0}
.setup-stat{flex:1;border-right:1px solid var(--border);padding-right:10px;margin-right:10px}
.setup-stat:last-child{border-right:none;padding-right:0;margin-right:0}
.setup-stat-val{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text1)}
.setup-stat-lbl{font-size:9px;color:var(--text3);text-transform:uppercase;margin-top:1px}
.m-seg-tabs{display:flex;margin:12px 12px 12px;background:var(--bg2);border-radius:6px;padding:3px;border:1px solid var(--border)}
.m-seg-tab{flex:1;text-align:center;padding:6px 4px;font-size:11px;font-weight:600;color:var(--text3);cursor:pointer;border-radius:4px;font-family:var(--mono);transition:all .15s}
.m-seg-tab.active{background:var(--bg3);color:var(--text1);border:1px solid var(--border2)}
.algo-row{display:flex;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border)}
.algo-row:last-child{border-bottom:none}
.algo-name{flex:1;font-size:12px;font-weight:600;color:var(--text1)}
.algo-sub{font-size:10px;color:var(--text3);font-family:var(--mono);margin-top:2px}
.algo-pnl{font-family:var(--mono);font-size:14px;font-weight:600;text-align:right;min-width:60px}
.data-row{display:flex;align-items:center;padding:9px 16px;border-bottom:1px solid var(--border);font-family:var(--mono);font-size:12px}
.data-row:last-child{border-bottom:none}
.data-date{color:var(--text2);min-width:80px}
.data-pnl{font-weight:600;text-align:right;min-width:56px}
.hist-card{margin:0 12px 8px;background:var(--bg1);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.hist-card-row1{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
.hist-typ{font-size:11px;color:var(--text2)}
.hist-pnl{font-family:var(--mono);font-size:15px;font-weight:600}
.hist-meta{display:flex;gap:12px}
.hist-item{font-family:var(--mono);font-size:11px;color:var(--text3)}
.hist-item span{color:var(--text2)}
.filter-scroll{display:flex;gap:6px;overflow-x:auto;padding:0 12px 10px;-webkit-overflow-scrolling:touch}
.filter-scroll::-webkit-scrollbar{display:none}
.bottom-nav{display:flex;background:var(--bg1);border-top:1px solid var(--border);padding:8px 0 max(8px,env(safe-area-inset-bottom));flex-shrink:0}
.m-nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;padding:4px 0;transition:all .15s}
.m-nav-icon{width:22px;height:22px;opacity:.35;transition:opacity .15s}
.m-nav-label{font-size:9px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--text3);transition:color .15s}
.m-nav-item.active .m-nav-icon{opacity:1}
.m-nav-item.active .m-nav-label{color:var(--blue)}
.nav-dot{position:absolute;top:-2px;right:-2px;width:7px;height:7px;background:var(--amber);border-radius:50%;border:1.5px solid var(--bg1)}
.nav-icon-wrap{position:relative}
.section-wrap{margin:0 12px 16px;background:var(--bg1);border:1px solid var(--border);border-radius:8px;overflow:hidden}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
/* ── Data ── */
const SETUPS = [
  {id:'SOL/BTC',model:'Algo1',kier:'SHORT',typ:'impulse_aggressive_short',w:1,tps:2,ms:1,sl:'84.48',algoP:'86.27',wr:'5.56',wrMs:'6.6',status:'czeka'},
  {id:'Algo1',model:'Algo1',kier:'SHORT',typ:'impulse_aggressive_short',w:1,tps:1,ms:0,sl:'84.50',algoP:'86.27',wr:'5.56',wrMs:'6.6',status:'short'},
  {id:'atm',model:'Algo2',kier:'LONG',typ:'range_support_long',w:2,tps:3,ms:2,sl:'83.20',algoP:'84.18',wr:'1.06',wrMs:'3.27',status:'czeka'},
  {id:'695c',model:'Algo3',kier:'SHORT',typ:'shallow_tail',w:1,tps:2,ms:1,sl:'85.45',algoP:'85.43',wr:'3.27',wrMs:'3.27',status:'short'},
];

const TRADES = [
  {id:'4390',kier:'SHORT',model:'Algo1',typ:'impulse_aggressive_long',we:86.00,tp:84.16,pnl:48.4,ms:'TPS',date:'2026-04-27'},
  {id:'4374',kier:'SHORT',model:'Algo1',typ:'impulse_aggressive_short',we:86.05,tp:84.29,pnl:49.3,ms:'TPS',date:'2026-04-27'},
  {id:'4372',kier:'SHORT',model:'Algo1',typ:'range_resilience_short',we:85.00,tp:84.46,pnl:48.3,ms:'TPS',date:'2026-04-27'},
  {id:'4361',kier:'LONG',model:'Algo2',typ:'range_support_long',we:83.50,tp:86.00,pnl:-32.1,ms:'SL',date:'2026-04-26'},
  {id:'4358',kier:'SHORT',model:'Algo1',typ:'shallow_tail',we:84.80,tp:84.20,pnl:11.2,ms:'TPS',date:'2026-04-26'},
  {id:'4350',kier:'LONG',model:'GPT-8',typ:'impulse_aggressive_long',we:82.00,tp:83.50,pnl:-18.4,ms:'SL',date:'2026-04-25'},
  {id:'4344',kier:'SHORT',model:'GPT-B',typ:'range_resilience_short',we:84.10,tp:83.50,pnl:22.0,ms:'TPS',date:'2026-04-25'},
];
/* ── Helpers ── */
const fmtPrice = (p) => p == null ? '—' : `$${Number(p).toFixed(2)}`;
const fmtPnl = (p) => p == null ? '—' : (p >= 0 ? `+$${p.toFixed(2)}` : `-$${Math.abs(p).toFixed(2)}`);
const fmtWr = (w) => w == null ? '—' : `${w}%`;
const fmtSl = (sl) => sl == null ? '—' : Number(sl).toFixed(2);
const regDir = (rd) => rd === 'up' ? 'up' : 'down';
const regLabel = (r, rd) => r ? (r.toUpperCase() + (rd === 'up' ? '↑' : '↓')) : 'N/A';
const fmtTs = (v) => { if (!v) return '—'; const n = typeof v === 'string' && v.includes('-') ? new Date(v) : new Date(Number(v) < 1e12 ? Number(v) * 1000 : Number(v)); if (isNaN(n)) return '—'; return n.toLocaleString('pl-PL', { timeZone: 'Europe/Warsaw', year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit', hour12: false }).replace(',', ''); };
const nowPl = () => {
  const d = new Date();
  const m = ['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'];
  return `${d.getDate()} ${m[d.getMonth()]} ${d.getFullYear()} · ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
};
const normalizeSetup = (s) => {
  const entries = s.entries || [];
  const tps     = s.tps     || [];
  let status = s.status;
  if (s.tp1_hit_at || s.exchange_tp1_done)   status = 'po_tp1';
  else if (s.entry_hit_at) status = 'pozycja';
  return {
    id: s.id, model: s.model, kier: s.kier, typ: s.typ, variant: s.variant||'', status,
    shadow: s.shadow || false, tradeable: s.tradeable || false,
    w:   entries.length > 0 ? entries.map(e=>Number(e).toFixed(2)).join(' / ') : (s.w ?? '—'),
    tp1: tps[0] != null ? Number(tps[0]).toFixed(2) : '—',
    tp2: tps[1] != null ? Number(tps[1]).toFixed(2) : '—',
    sl:  fmtSl(s.sl),
    ms:  s.ms,
    _raw: s,
  };
};
/* ── Context ── */
const DashCtx = React.createContext({price:null, stats:null, market:null, setups:SETUPS, alert:null, statsPeriod:'30d', setStatsPeriod:()=>{}, refreshSetups:()=>{}, budget:null});
const useDash = () => React.useContext(DashCtx);
/* ── Modal: Zmień TP ── */
function TPModal({ setup, onClose, onSaved }) {
  const [tp1,setTp1]=useState(setup.tp1!=='—'?setup.tp1:'');
  const [tp2,setTp2]=useState(setup.tp2!=='—'?setup.tp2:'');
  const [saving,setSaving]=useState(false);
  const [err,setErr]=useState('');
  const save=async()=>{
    setSaving(true); setErr('');
    try {
      const body={};
      if(tp1!=='') body.tp1=parseFloat(tp1);
      if(tp2!=='') body.tp2=parseFloat(tp2);
      const r=await fetch(`/api/update-tps/${setup.id}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
      if(!r.ok){const d=await r.json();setErr(d.detail||'Błąd');setSaving(false);return;}
      onSaved();
    } catch(e){setErr('Błąd połączenia');setSaving(false);}
  };
  const inp={background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:4,padding:'6px 10px',color:'var(--text1)',fontFamily:'var(--mono)',fontSize:13,width:'100%',boxSizing:'border-box'};
  return (
    <div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.6)',zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center'}} onClick={onClose}>
      <div style={{background:'var(--bg1)',border:'1px solid var(--border2)',borderRadius:10,padding:24,width:300,maxWidth:'90vw'}} onClick={e=>e.stopPropagation()}>
        <div style={{fontSize:13,fontWeight:700,marginBottom:16,color:'var(--text1)'}}>Zmień TP — #{setup.id}</div>
        <div style={{marginBottom:12}}>
          <div style={{fontSize:10,color:'var(--text3)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.06em'}}>TP1</div>
          <input style={inp} value={tp1} onChange={e=>setTp1(e.target.value)} placeholder={setup.tp1} type="number" step="0.01"/>
        </div>
        <div style={{marginBottom:16}}>
          <div style={{fontSize:10,color:'var(--text3)',marginBottom:4,textTransform:'uppercase',letterSpacing:'.06em'}}>TP2</div>
          <input style={inp} value={tp2} onChange={e=>setTp2(e.target.value)} placeholder={setup.tp2} type="number" step="0.01"/>
        </div>
        {err && <div style={{color:'var(--red)',fontSize:11,marginBottom:12,fontFamily:'var(--mono)'}}>{err}</div>}
        <div style={{display:'flex',gap:8}}>
          <button className="action-btn gray" style={{flex:1,justifyContent:'center',padding:'7px 0'}} onClick={onClose}>Anuluj</button>
          <button className="action-btn green" style={{flex:1,justifyContent:'center',padding:'7px 0'}} onClick={save} disabled={saving}>{saving?'…':'Zapisz'}</button>
        </div>
      </div>
    </div>
  );
}
/* ── Setup action buttons ── */
function SetupActions({ setup }) {
  const {refreshSetups}=useDash();
  const [tpModal,setTpModal]=useState(false);
  const [cancelling,setCancelling]=useState(false);
  const cancel=async()=>{
    if(!confirm(`Anulować setup #${setup.id}?`)) return;
    setCancelling(true);
    try{
      const r=await fetch(`/api/cancel-setup/${setup.id}`,{method:'POST'});
      if(r.ok) refreshSetups();
      else alert('Błąd anulowania');
    }catch{alert('Błąd połączenia');}
    setCancelling(false);
  };
  return (
    <>
      <div style={{display:'flex',gap:4}}>
        <button className="action-btn red" onClick={cancel} disabled={cancelling}>{cancelling?'…':'Anuluj'}</button>
        <button className="action-btn gray" onClick={()=>setTpModal(true)}>Zmień TP</button>
      </div>
      {tpModal && <TPModal setup={setup} onClose={()=>setTpModal(false)} onSaved={()=>{setTpModal(false);refreshSetups();}}/>}
    </>
  );
}
/* ── ActiveSetupsPanel — rich table with P&L and Bitget verification ── */
function ActiveSetupsPanel({ mobile = false }) {
  const { setups, price, refreshSetups } = useDash();
  const liveSetups = setups.filter(s => s.tradeable);
  const currentPrice = price ? price.price : null;
  const [bitgetData, setBitgetData] = useState(null);
  const [bitgetLoading, setBitgetLoading] = useState(false);
  const [bitgetError, setBitgetError] = useState(null);
  const [expanded, setExpanded] = useState(new Set());

  const fetchBitget = () => {
    setBitgetLoading(true);
    setBitgetError(null);
    fetch('/api/bitget-live').then(r => r.ok ? r.json() : null).then(d => {
      if (d && !d.error) setBitgetData(d);
      else setBitgetError(d?.error || 'Błąd');
      setBitgetLoading(false);
    }).catch(() => { setBitgetError('Brak połączenia'); setBitgetLoading(false); });
  };

  const toggleExp = (id) => setExpanded(prev => {
    const n = new Set(prev); n.has(id) ? n.delete(id) : n.add(id); return n;
  });

  const calcLivePnl = (s) => {
    if (!currentPrice) return null;
    const raw = s._raw || s;
    const avgEntry = raw.avg_entry || (raw.entries && raw.entries[0] != null ? Number(raw.entries[0]) : null);
    if (!avgEntry) return null;
    const sign = (raw.kier || s.kier || '').toUpperCase() === 'LONG' ? 1 : -1;
    const fullQty = raw.exchange_qty_full ? parseFloat(raw.exchange_qty_full) : Math.floor(100 * 20 / avgEntry / 0.1) * 0.1;
    if (!fullQty || fullQty <= 0) return null;
    const isAfterTp1 = raw.exchange_tp1_done || raw.tp1_hit_at;
    const qty = isAfterTp1 ? (raw.exchange_qty_half ? parseFloat(raw.exchange_qty_half) : fullQty / 2) : fullQty;
    return sign * qty * (currentPrice - avgEntry);
  };

  const calcPotentialPnl = (s) => {
    const raw = s._raw || s;
    const entry = raw.avg_entry || (raw.entries && raw.entries[0] != null ? Number(raw.entries[0]) : null);
    if (!entry) return { tp1: null, tp12: null, sl: null, realized: null, remaining: null, remainRisk: null, afterTp1: false };
    const tp1 = raw.tps && raw.tps[0] != null ? Number(raw.tps[0]) : null;
    const tp2 = raw.tps && raw.tps[1] != null ? Number(raw.tps[1]) : null;
    const sl = raw.sl != null ? Number(raw.sl) : null;
    const slAfter = raw.sl_after_tp1 != null ? Number(raw.sl_after_tp1) : null;
    const sign = (raw.kier || s.kier || '').toUpperCase() === 'LONG' ? 1 : -1;
    const tu = raw.trade_usdt || 100;
    const qty = raw.exchange_qty_full ? parseFloat(raw.exchange_qty_full) : Math.floor(tu * 20 / entry / 0.1) * 0.1;
    if (!qty || qty <= 0) return { tp1: null, tp12: null, sl: null, realized: null, remaining: null, remainRisk: null, afterTp1: false };
    const half = qty / 2;
    const isAfterTp1 = raw.exchange_tp1_done || raw.tp1_hit_at;
    const tp1Pnl = tp1 != null ? (isAfterTp1 ? sign * half * (tp1 - entry) : sign * qty * (tp1 - entry)) : null;
    const tp12Pnl = tp1 != null && tp2 != null ? sign * half * (tp1 - entry) + sign * half * (tp2 - entry) : tp1Pnl;
    const slPnl = isAfterTp1 ? (slAfter != null ? sign * half * (slAfter - entry) : 0) : (sl != null ? sign * qty * (sl - entry) : null);
    const realized = isAfterTp1 && tp1 != null ? sign * half * (tp1 - entry) : null;
    const remaining = isAfterTp1 && tp2 != null ? sign * half * (tp2 - entry) : null;
    const slNow = isAfterTp1 ? (slAfter || entry) : null;
    const remainRisk = isAfterTp1 && slNow != null ? sign * half * (slNow - entry) : null;
    return { tp1: tp1Pnl, tp12: tp12Pnl, sl: slPnl, realized, remaining, remainRisk, afterTp1: !!isAfterTp1 };
  };

  const verifyOrder = (oid, bitget) => {
    if (!oid) return { status: 'missing', label: 'Brak OID' };
    if (!bitget) return { status: 'unknown', label: '?' };
    const tpsl = bitget.tpsl || {};
    const plans = bitget.plans || {};
    if (tpsl[oid]) return { status: 'ok', label: 'OK', data: tpsl[oid] };
    if (plans[oid]) return { status: 'ok', label: 'OK', data: plans[oid] };
    return { status: 'missing_on_bitget', label: 'Brak na Bitget!' };
  };

  const vColor = (v) => v.status === 'ok' ? 'var(--green)' : v.status === 'missing' ? 'var(--text3)' : 'var(--red)';
  const fU = (v) => v == null ? '—' : `${v > 0 ? '+' : ''}${v.toFixed(1)}$`;
  const pC = (v) => v == null ? 'var(--text3)' : v > 0 ? 'var(--green)' : v < 0 ? 'var(--red)' : 'var(--text3)';
  const fP = (p) => p == null ? '—' : Number(p).toFixed(2);

  if (liveSetups.length === 0) {
    if (mobile) return null;
    return (
      <div className="panel" style={{flexShrink:0}}>
        <div className="panel-head">
          <span className="panel-title">Aktywne setupy</span>
          <span className="panel-badge">0</span>
        </div>
        <div className="panel-body" style={{padding:'16px',textAlign:'center',color:'var(--text3)',fontSize:11,fontFamily:'var(--mono)'}}>Brak aktywnych setupów</div>
      </div>
    );
  }

  if (mobile) {
    return (
      <div style={{margin:'0 12px 8px'}}>
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'10px 0 6px'}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <span style={{fontSize:11,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--text2)'}}>Aktywne setupy</span>
            <span className="sec-badge">{liveSetups.length}</span>
          </div>
          <button className="action-btn gray" style={{fontSize:9,padding:'3px 8px'}} onClick={fetchBitget} disabled={bitgetLoading}>
            {bitgetLoading ? '…' : bitgetData ? '↻ Bitget' : '⚡ Sprawdź Bitget'}
          </button>
        </div>
        {liveSetups.map((s, i) => {
          const raw = s._raw || s;
          const isOpen = raw.entry_hit_at || raw.exchange_position_opened;
          const livePnl = isOpen ? calcLivePnl(s) : null;
          const pot = calcPotentialPnl(s);
          const entry = raw.avg_entry || (raw.entries && raw.entries[0] != null ? Number(raw.entries[0]) : null);
          const tp1 = raw.tps && raw.tps[0] != null ? Number(raw.tps[0]) : null;
          const tp2 = raw.tps && raw.tps[1] != null ? Number(raw.tps[1]) : null;
          const sl = raw.sl;
          const isExp = expanded.has(s.id);
          const vTP1 = bitgetData ? verifyOrder(raw.exchange_tp1_oid, bitgetData) : null;
          const vTP2 = bitgetData ? verifyOrder(raw.exchange_tp2_oid, bitgetData) : null;
          const vSL = bitgetData ? verifyOrder(raw.exchange_sl_oid, bitgetData) : null;
          const allOk = vTP1 && vSL && vTP1.status === 'ok' && vSL.status === 'ok';
          const hasIssue = vTP1 && vSL && (vTP1.status === 'missing_on_bitget' || vSL.status === 'missing_on_bitget');
          return (
            <div key={i} className="setup-card" onClick={() => toggleExp(s.id)} style={{cursor:'pointer'}}>
              <div className="setup-card-top">
                <div className="setup-card-row1">
                  <div style={{display:'flex',alignItems:'center',gap:8}}>
                    <span className="setup-id">{s.id}</span>
                    <span className={`kier-badge ${s.kier.toLowerCase()}`}>{s.kier}</span>
                    {bitgetData && <span style={{fontSize:9,fontFamily:'var(--mono)',color:hasIssue?'var(--red)':allOk?'var(--green)':'var(--text3)'}}>{hasIssue?'⚠':'✓'}</span>}
                  </div>
                  <div style={{textAlign:'right'}}>
                    {isOpen && livePnl != null
                      ? <><div style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:700,color:pC(livePnl)}}>{fU(livePnl)}</div>
                          <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)'}}>{pot.afterTp1 ? `live · TP1: ${fU(pot.realized)}` : 'live'}</div></>
                      : <div style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--text3)',fontStyle:'italic'}}>{pot.tp12 != null && pot.tp12 !== pot.tp1 ? fU(pot.tp12) : (pot.tp1 != null ? fU(pot.tp1) : '—')}<span style={{fontSize:9,marginLeft:2}}>pot.</span></div>
                    }
                  </div>
                </div>
                <div className="setup-typ">{s.typ}{s.variant && <span style={{color:'var(--text3)',fontSize:9,marginLeft:4}}>{s.variant}</span>}</div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr 1fr',padding:'8px 12px',gap:0}}>
                <div className="setup-stat"><div className="setup-stat-val" style={{fontSize:11}}>{fP(entry)}</div><div className="setup-stat-lbl">Wejście</div></div>
                <div className="setup-stat"><div className="setup-stat-val" style={{fontSize:11,color:'var(--green)'}}>{fP(tp1)}</div><div className="setup-stat-lbl">TP1</div></div>
                <div className="setup-stat"><div className="setup-stat-val" style={{fontSize:11,color:'var(--green)',opacity:.7}}>{tp2 != null ? fP(tp2) : '—'}</div><div className="setup-stat-lbl">TP2</div></div>
                <div className="setup-stat" style={{borderRight:'none'}}><div className="setup-stat-val red" style={{fontSize:11}}>{fP(sl)}</div><div className="setup-stat-lbl">SL</div></div>
              </div>
              {isExp && <div style={{padding:'6px 12px 10px',borderTop:'1px solid var(--border)',fontSize:10,fontFamily:'var(--mono)',color:'var(--text2)'}}>
                <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:4}}>
                  <span style={{color:'var(--text3)'}}>Model: <span style={{color:'var(--text2)'}}>{raw.model||s.model}</span></span>
                  {raw.rr && <span style={{color:'var(--text3)'}}>RR: <span style={{color:'var(--text2)'}}>1:{Number(raw.rr).toFixed(1)}</span></span>}
                  {raw.score && <span style={{color:'var(--text3)'}}>Score: <span style={{color:'var(--text2)'}}>{Number(raw.score).toFixed(1)}</span></span>}
                  {raw.trade_usdt!=null && <span style={{color:'var(--text3)'}}>Kwota: <span style={{color:'var(--text2)'}}>${Number(raw.trade_usdt).toFixed(0)}</span></span>}
                  {raw.exchange_qty_full && <span style={{color:'var(--text3)'}}>Qty: <span style={{color:'var(--text2)'}}>{raw.exchange_qty_full} SOL</span></span>}
                </div>
                {pot.afterTp1 ? <div style={{marginBottom:4}}>
                  <span style={{color:'var(--text3)'}}>TP1 zreal.: </span><span style={{color:'var(--green)'}}>{fU(pot.realized)}</span>
                  {pot.remaining != null && <><span style={{color:'var(--text3)',marginLeft:8}}>Pot. TP2: </span><span style={{color:'var(--green)'}}>{fU(pot.remaining)}</span></>}
                  {pot.remainRisk != null && <><span style={{color:'var(--text3)',marginLeft:8}}>Risk BE: </span><span style={{color:pC(pot.remainRisk)}}>{fU(pot.remainRisk)}</span></>}
                </div> : <div style={{marginBottom:4}}>
                  {pot.sl != null && <><span style={{color:'var(--text3)'}}>Ryzyko SL: </span><span style={{color:'var(--red)'}}>{fU(pot.sl)}</span></>}
                  {pot.tp1 != null && <><span style={{color:'var(--text3)',marginLeft:8}}>Pot. TP1: </span><span style={{color:'var(--green)'}}>{fU(pot.tp1)}</span></>}
                  {pot.tp12 != null && pot.tp12 !== pot.tp1 && <><span style={{color:'var(--text3)',marginLeft:8}}>Pot. TP1+TP2: </span><span style={{color:'var(--green)'}}>{fU(pot.tp12)}</span></>}
                </div>}
                {bitgetData && <div style={{marginTop:4,padding:'4px 0',borderTop:'1px solid var(--border)'}}>
                  <div style={{fontWeight:600,color:'var(--text3)',fontSize:9,marginBottom:3,textTransform:'uppercase',letterSpacing:'.06em'}}>Weryfikacja Bitget</div>
                  <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
                    {raw.exchange_tp1_oid && <span>TP1: <span style={{color:vColor(vTP1)}}>{vTP1.label}</span>
                      {vTP1.data && <span style={{color:'var(--text3)'}}> @{vTP1.data.triggerPrice} qty:{vTP1.data.size}</span>}
                    </span>}
                    {raw.exchange_tp2_oid && <span>TP2: <span style={{color:vColor(vTP2)}}>{vTP2.label}</span>
                      {vTP2.data && <span style={{color:'var(--text3)'}}> @{vTP2.data.triggerPrice} qty:{vTP2.data.size}</span>}
                    </span>}
                    {raw.exchange_sl_oid && <span>SL: <span style={{color:vColor(vSL)}}>{vSL.label}</span>
                      {vSL.data && <span style={{color:'var(--text3)'}}> @{vSL.data.triggerPrice} qty:{vSL.data.size}</span>}
                    </span>}
                    {!raw.exchange_tp1_oid && !raw.exchange_sl_oid && <span style={{color:'var(--text3)',fontStyle:'italic'}}>Brak zleceń na Bitget</span>}
                  </div>
                  {/* Compare trigger prices with our levels */}
                  {vTP1 && vTP1.data && tp1 != null && Math.abs(Number(vTP1.data.triggerPrice) - tp1) > 0.01 &&
                    <div style={{color:'var(--amber)',marginTop:2}}>⚠ TP1 Bitget ({vTP1.data.triggerPrice}) ≠ nasz ({fP(tp1)})</div>}
                  {vSL && vSL.data && sl != null && Math.abs(Number(vSL.data.triggerPrice) - sl) > 0.01 &&
                    <div style={{color:'var(--amber)',marginTop:2}}>⚠ SL Bitget ({vSL.data.triggerPrice}) ≠ nasz ({fP(sl)})</div>}
                </div>}
                <div style={{marginTop:6,display:'flex',gap:4}}>
                  <SetupActions setup={s}/>
                </div>
              </div>}
            </div>
          );
        })}
        {bitgetError && <div style={{padding:'6px 12px',fontSize:10,color:'var(--red)',fontFamily:'var(--mono)'}}>{bitgetError}</div>}
      </div>
    );
  }

  /* Desktop */
  return (
    <div className="panel" style={{flexShrink:0}}>
      <div className="panel-head">
        <span className="panel-title">Aktywne setupy</span>
        <div className="panel-right">
          <span className="panel-badge">{liveSetups.length}</span>
          <button className="action-btn gray" style={{fontSize:9,padding:'3px 10px'}} onClick={fetchBitget} disabled={bitgetLoading}>
            {bitgetLoading ? '…' : bitgetData ? '↻ Odśwież Bitget' : '⚡ Sprawdź Bitget'}
          </button>
        </div>
      </div>
      <div className="panel-body">
        <table className="tbl">
          <thead><tr>
            <th>ID</th><th>Kierunek</th><th>Typ</th><th>Wejście</th><th>TP1</th><th>TP2</th><th>SL</th><th>RR</th><th>Kwota</th>
            <th>P&L</th>
            {bitgetData && <th>Bitget</th>}
            <th>Akcja</th>
          </tr></thead>
          <tbody>{liveSetups.map((s, i) => {
            const raw = s._raw || s;
            const isOpen = raw.entry_hit_at || raw.exchange_position_opened;
            const livePnl = isOpen ? calcLivePnl(s) : null;
            const pot = calcPotentialPnl(s);
            const entry = raw.avg_entry || (raw.entries && raw.entries[0] != null ? Number(raw.entries[0]) : null);
            const tp1 = raw.tps && raw.tps[0] != null ? Number(raw.tps[0]) : null;
            const tp2 = raw.tps && raw.tps[1] != null ? Number(raw.tps[1]) : null;
            const sl = raw.sl;
            const isExp = expanded.has(s.id);
            const vTP1 = bitgetData ? verifyOrder(raw.exchange_tp1_oid, bitgetData) : null;
            const vTP2 = bitgetData ? verifyOrder(raw.exchange_tp2_oid, bitgetData) : null;
            const vSL = bitgetData ? verifyOrder(raw.exchange_sl_oid, bitgetData) : null;
            const allOk = vTP1 && vSL && vTP1.status === 'ok' && vSL.status === 'ok';
            const hasIssue = (vTP1 && vTP1.status === 'missing_on_bitget') || (vSL && vSL.status === 'missing_on_bitget');
            return <React.Fragment key={i}>
              <tr onClick={() => toggleExp(s.id)} style={{cursor:'pointer'}}>
                <td className="mono" style={{color:'var(--text1)',fontWeight:600}}>{s.id}</td>
                <td><span className={`kier-badge ${s.kier.toLowerCase()}`}>{s.kier}</span></td>
                <td style={{color:'var(--text2)',fontSize:11,maxWidth:180}}>
                  {s.typ}
                  {s.variant && <div style={{color:'var(--text3)',fontSize:10}}>{s.variant}</div>}
                  <div style={{color:'var(--text3)',fontSize:9}}>{raw.model || s.model}</div>
                </td>
                <td className="mono" style={{fontSize:11}}>{fP(entry)}</td>
                <td className="mono" style={{fontSize:11,color:'var(--green)'}}>{fP(tp1)}</td>
                <td className="mono" style={{fontSize:11,color:'var(--green)',opacity:.7}}>{tp2 != null ? fP(tp2) : '—'}</td>
                <td className="mono" style={{fontSize:11,color:'var(--red)'}}>{fP(sl)}</td>
                <td className="mono" style={{fontSize:11,color:'var(--text3)'}}>{raw.rr ? `1:${Number(raw.rr).toFixed(1)}` : '—'}</td>
                <td className="mono" style={{fontSize:11,color:'var(--text2)'}}>{raw.trade_usdt!=null ? `$${Number(raw.trade_usdt).toFixed(0)}` : '—'}</td>
                <td className="mono" style={{minWidth:80}}>
                  {isOpen && livePnl != null
                    ? <><span style={{color:pC(livePnl),fontWeight:700,fontSize:13}}>{fU(livePnl)}</span><span style={{fontSize:8,color:'var(--text3)',marginLeft:2}}>live</span>
                        {pot.afterTp1
                          ? <br/>
                          : <><br/><span style={{fontSize:9,color:'var(--text3)',fontStyle:'italic'}}>{pot.tp12 != null && pot.tp12 !== pot.tp1 ? fU(pot.tp12) : (pot.tp1 != null ? fU(pot.tp1) : '—')} pot.</span></>
                        }
                        {pot.afterTp1 && <span style={{fontSize:9,color:'var(--green)'}}>TP1: {fU(pot.realized)}</span>}</>
                    : <><span style={{color:'var(--text3)',fontStyle:'italic'}}>{pot.tp12 != null && pot.tp12 !== pot.tp1 ? fU(pot.tp12) : (pot.tp1 != null ? fU(pot.tp1) : '—')}</span>
                        <span style={{fontSize:8,color:'var(--text3)',marginLeft:2}}>pot.</span>
                        {pot.sl != null && <><br/><span style={{fontSize:9,color:'#ff6b6b88'}}>{fU(pot.sl)} risk</span></>}</>
                  }
                </td>
                {bitgetData && <td style={{fontSize:10,fontFamily:'var(--mono)'}}>
                  {hasIssue
                    ? <span style={{color:'var(--red)',fontWeight:600}}>⚠ Problem</span>
                    : allOk
                      ? <span style={{color:'var(--green)'}}>✓ OK</span>
                      : <span style={{color:'var(--text3)'}}>—</span>}
                </td>}
                <td onClick={e => e.stopPropagation()}><SetupActions setup={s}/></td>
              </tr>
              {isExp && <tr>
                <td colSpan={bitgetData ? 12 : 11} style={{background:'var(--bg2)',padding:'8px 14px',borderTop:'none'}}>

  const toggleRow=(id)=>setExpandedRows(prev=>{const n=new Set(prev);n.has(id)?n.delete(id):n.add(id);return n;});
  const calcLivePnl=(r)=>{if(!currentPrice||!r.avg_entry)return null;const sign=r.kier==='LONG'?1:-1;const fullQty=r.exchange_qty_full?parseFloat(r.exchange_qty_full):Math.floor(100*20/r.avg_entry/0.1)*0.1;if(!fullQty||fullQty<=0)return null;const isAfterTp1=r.exchange_tp1_done||r.status_key==='after_tp1';const qty=isAfterTp1?(r.exchange_qty_half?parseFloat(r.exchange_qty_half):fullQty/2):fullQty;return sign*qty*(currentPrice-r.avg_entry);};
  const calcPotential=(r)=>{
    const entry=r.avg_entry||(r.entries&&r.entries[0]!=null?Number(r.entries[0]):null);
    if(!entry) return {tp1:null,tp12:null,sl:null,tp1Pct:null,tp12Pct:null};
    const tp1=r.tps&&r.tps[0]!=null?Number(r.tps[0]):null;
    const tp2=r.tps&&r.tps[1]!=null?Number(r.tps[1]):null;
    const sl=r.sl!=null?Number(r.sl):null;
    const sign=r.kier==='LONG'?1:-1;
    const tu=r.trade_usdt!=null?parseFloat(r.trade_usdt):(tradeUsdt||100);
    const qty=r.exchange_qty_full?parseFloat(r.exchange_qty_full):Math.floor(tu*20/entry/0.1)*0.1;
    if(!qty||qty<=0) return {tp1:null,tp12:null,sl:null,tp1Pct:null,tp12Pct:null};
    const margin=qty*entry/20;
    const half=qty/2;
    const afterTp1=r.status_key==='after_tp1';
    const tp1Pnl=tp1!=null?(afterTp1?sign*half*(tp1-entry):sign*qty*(tp1-entry)):null;
    const tp12Pnl=tp1!=null&&tp2!=null?sign*half*(tp1-entry)+sign*half*(tp2-entry):tp1Pnl;
    const slPnl=afterTp1?0:(sl!=null?sign*qty*(sl-entry):null);
    const tp1Pct=tp1Pnl!=null?Math.round(tp1Pnl/margin*10000)/100:null;
    const tp12Pct=tp12Pnl!=null?Math.round(tp12Pnl/margin*10000)/100:null;
    return {tp1:tp1Pnl,tp12:tp12Pnl,sl:slPnl,tp1Pct,tp12Pct,afterTp1};
  };
  const StatusPill=({sk,sl})=>{

  useEffect(()=>{

  },[fetchRows]);
  const StatusResultChip=({r})=>{

    const calcPreview=(result,qtyStr)=>{

      if(!entry||entry<=0) return null;
      const qty=parseFloat(qtyStr);
      if(!qty||qty<=0) return null;
      const half=Math.max(Math.floor((qty/2)/0.1)*0.1,0.1);
      const sign=(r.kier||'LONG').toUpperCase()==='LONG'?1:-1;
      const tp1=r.tps&&r.tps[0]!=null?Number(r.tps[0]):null;
      const tp2=r.tps&&r.tps[1]!=null?Number(r.tps[1]):null;
      const sl=r.sl!=null?Number(r.sl):null;
      if(result==='TP1'&&tp1) return sign*qty*(tp1-entry);

      if(result==='TP1+BE'&&tp1) return sign*half*(tp1-entry);

        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={inpStyle}/>

                  <StatusResultChip r={r}/>
                  {r.model&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--text3)',marginTop:2}}>{r.model}{r.variant&&r.variant!=='baseline'?<span style={{color:'var(--border2)'}}> /{r.variant}</span>:''}</div>}
                </td>

                <td><span className={`kier-badge ${(r.kier||'long').toLowerCase()}`}>{r.kier}</span></td>
                <td style={{fontSize:10,color:'var(--text2)',maxWidth:160}}>{r.typ}<br/><span style={{color:'var(--text3)'}}>{r.variant}</span></td>
                <td className="mono" style={{fontSize:10,whiteSpace:'nowrap'}}>{r.regime?<><span style={{color:r.regime.includes('UP')?'var(--green)':r.regime.includes('DOWN')?'var(--red)':'var(--text3)'}}>{r.regime.replace('_',' ')}</span>{r.regime_score!=null&&<span style={{color:'var(--text3)',marginLeft:3}}>({r.regime_score})</span>}</>:'—'}</td>

                <td className="mono" style={{minWidth:64}}>
                  {isOpen&&livePnl!=null

                    : isActive
                      ? <span style={dimStyle}>{pot.tp1!=null?fmtU(pot.tp1):'—'}{pot.tp1Pct!=null&&<><br/><span style={{fontSize:9}}>{fmtP(pot.tp1Pct)}</span></>}</span>
                      : <><span style={{color:pC(r.pnl_tp1),fontWeight:600}}>{fmtU(r.pnl_tp1)}</span>{r.pnl_tp1_pct!=null&&<><br/><span style={{fontSize:9,color:pC(r.pnl_tp1_pct)}}>{fmtP(r.pnl_tp1_pct)}</span></>}</>}
                </td>
                <td className="mono" style={{minWidth:64}}>
                  {isActive
                    ? <span style={dimStyle}>{pot.tp12!=null?fmtU(pot.tp12):'—'}{pot.tp12Pct!=null&&<><br/><span style={{fontSize:9}}>{fmtP(pot.tp12Pct)}</span></>}</span>
                    : <><span style={{color:pC(r.pnl_tp12),fontWeight:600}}>{fmtU(r.pnl_tp12)}</span>{r.pnl_pct!=null&&<><br/><span style={{fontSize:9,color:pC(r.pnl_pct)}}>{fmtP(r.pnl_pct)}</span></>}</>}
                </td>
                <td className="mono" style={{minWidth:54}}>
                  {isActive
                    ? <span style={{...dimStyle,color:pot.sl!=null&&pot.sl<0?'#ff6b6b88':'var(--text3)'}}>{pot.sl!=null?fmtU(pot.sl):'—'}</span>
                    : <span style={{color:'var(--text3)'}}>—</span>}
                </td>
              </tr>
              {isExp&&<tr>
                <td colSpan={13} style={{background:'var(--bg2)',padding:'7px 14px',borderTop:'none'}}>
                  <div style={{display:'flex',gap:16,fontSize:10,color:'var(--text2)',fontFamily:'var(--mono)',flexWrap:'wrap',alignItems:'center'}}>

                    {r.rejection&&<span style={{fontFamily:'var(--mono)',fontSize:9,padding:'2px 6px',borderRadius:3,background:'var(--red-dim)',color:'var(--red)',border:'1px solid #ff4d6a33'}} title="Odrzucony algorytmicznie — śledzony dalej tylko jako dane obserwacyjne/ML">ODRZUCONY: {r.rejection}</span>}
                    <span><span style={{color:'var(--text3)'}}>Alert:&nbsp;</span>{r.t_def||'—'}</span>
                    <span><span style={{color:'var(--text3)'}}>Wejście:&nbsp;</span>{fmtTs(r.t_entry)}</span>
                    <span><span style={{color:'var(--text3)'}}>Wyjście:&nbsp;</span>{r.t_exit||'—'}</span>
                    {r.exchange_tp1_oid&&<span><span style={{color:'var(--text3)'}}>Bitget TP1:&nbsp;</span>{r.exchange_tp1_oid}</span>}
                    {r.exchange_sl_oid&&<span><span style={{color:'var(--text3)'}}>Bitget SL:&nbsp;</span>{r.exchange_sl_oid}</span>}
                    {r.exchange_qty_full&&<span><span style={{color:'var(--text3)'}}>Qty:&nbsp;</span>{r.exchange_qty_full} SOL</span>}
                  </div>
                  {r.exchange_position_opened&&<ExchangeEventsPanel setupId={r.id}/>}
                </td>
              </tr>}
            </React.Fragment>;
          })}</tbody>
        </table>}
      </div>
    </div>
  );
}
/* ── ExchangeEventsPanel — diagnostyka TP/SL ── */
function ExchangeEventsPanel({setupId}) {
  const [events,setEvents]=useState(null);
  const [loading,setLoading]=useState(false);
  const load=()=>{setLoading(true);fetch(`/api/exchange-events?setup_id=${setupId}&limit=20`).then(r=>r.ok?r.json():[]).then(d=>{setEvents(d);setLoading(false);}).catch(()=>{setEvents([]);setLoading(false);});};
  useEffect(()=>{load();},[setupId]);
  const evColor=(e)=>{if(e.includes('fail')||e.includes('not_secured')||e.includes('restore_fail'))return'var(--red)';if(e.includes('ok')||e.includes('restored'))return'var(--green)';if(e.includes('diag'))return'var(--blue)';return'var(--text2)';};
  if(loading) return <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',padding:'4px 0'}}>Ładowanie zdarzeń…</div>;
  if(!events||events.length===0) return <div style={{fontSize:9,color:'var(--text3)',fontFamily:'var(--mono)',padding:'4px 0'}}>Brak zdarzeń exchange</div>;
  return <div style={{marginTop:6,borderTop:'1px solid var(--border)',paddingTop:4}}>
    <div style={{fontSize:9,fontWeight:600,color:'var(--text3)',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:4}}>Zdarzenia Exchange</div>
    {events.map((ev,i)=><div key={i} style={{fontSize:9,fontFamily:'var(--mono)',color:'var(--text2)',padding:'2px 0',display:'flex',gap:8,flexWrap:'wrap'}}>
      <span style={{color:'var(--text3)',minWidth:110,flexShrink:0}}>{ev.created_at?ev.created_at.replace('T',' ').slice(0,19):''}</span>
      <span style={{color:evColor(ev.event),fontWeight:600,minWidth:100}}>{ev.event}</span>
      {ev.detail&&Object.keys(ev.detail).length>0&&<span style={{color:'var(--text3)',wordBreak:'break-all',maxWidth:400}}>{JSON.stringify(ev.detail).slice(0,200)}</span>}
    </div>)}
  </div>;
}
/* ── FilterTree3 — drzewko checkbox model→type→variant ── */
function FilterTree3({tree,selected,onSelect,settingsFilter}) {
  const selSet=new Set(selected);
  const mkKey=(m,t,v)=>`${m}:${t}:${v}`;
  const allVariantsOf=(model,type_)=>type_.variants.length>0&&type_.variants.every(v=>selSet.has(mkKey(model.name,type_.name,v.name)));
  const someVariantsOf=(model,type_)=>type_.variants.some(v=>selSet.has(mkKey(model.name,type_.name,v.name)));
  const allTypesOf=(model)=>model.types.length>0&&model.types.every(t=>allVariantsOf(model,t));
  const someTypesOf=(model)=>model.types.some(t=>someVariantsOf(model,t));
  const toggleModel=model=>{
    const allSel=allTypesOf(model); const next=new Set(selSet);
    model.types.forEach(t=>t.variants.forEach(v=>{
      const k=mkKey(model.name,t.name,v.name); allSel?next.delete(k):next.add(k);
    }));
    onSelect([...next]);
  };
  const toggleType=(model,type_)=>{
    const allSel=allVariantsOf(model,type_); const next=new Set(selSet);
    type_.variants.forEach(v=>{const k=mkKey(model.name,type_.name,v.name); allSel?next.delete(k):next.add(k);});
    onSelect([...next]);
  };
  const toggleVariant=(m,t,v)=>{const k=mkKey(m,t,v);const next=new Set(selSet);next.has(k)?next.delete(k):next.add(k);onSelect([...next]);};
  const cb={width:13,height:13,accentColor:'var(--amber)',cursor:'pointer',flexShrink:0};
  const allKeys=tree.flatMap(m=>m.types.flatMap(t=>t.variants.map(v=>mkKey(m.name,t.name,v.name))));
  const activeKeys=tree.flatMap(m=>m.types.flatMap(t=>t.variants.filter(v=>v.active).map(v=>mkKey(m.name,t.name,v.name))));
  // Klucze włączone w Ustawieniach (Bitget ON)
  const settingsKeys=settingsFilter&&settingsFilter.types.length>0
    ? tree.flatMap(m=>m.types.flatMap(t=>t.variants
        .filter(v=>settingsFilter.types.includes(t.name)&&settingsFilter.variants.includes(v.name))
        .map(v=>mkKey(m.name,t.name,v.name))))
    : activeKeys;
  return <div style={{fontSize:12}}>
    <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
      <span className="filter-chip" style={{fontSize:10}} onClick={()=>onSelect(settingsKeys)}>tylko włączone</span>
      <span className="filter-chip" style={{fontSize:10,opacity:.6}} onClick={()=>onSelect(allKeys)}>wszystkie</span>
      <span className="filter-chip" style={{fontSize:10,opacity:.35}} onClick={()=>onSelect([])}>✕ wyczyść</span>
    </div>
    {tree.map(model=>(
      <div key={model.name} style={{marginBottom:6}}>
        <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',userSelect:'none'}}>
          <input type="checkbox" style={cb} checked={allTypesOf(model)}
            ref={el=>{if(el) el.indeterminate=someTypesOf(model)&&!allTypesOf(model);}}
            onChange={()=>toggleModel(model)}/>
          <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:model.active?'var(--text1)':'var(--text3)',textTransform:'uppercase',letterSpacing:'.05em'}}>{model.name}</span>
          {!model.active&&<span style={{fontSize:9,color:'var(--text3)',fontStyle:'italic'}}>arch.</span>}
        </label>
        <div style={{paddingLeft:16,marginTop:2}}>
          {model.types.map(type_=>(
            <div key={type_.name} style={{marginBottom:3}}>
              <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',userSelect:'none'}}>
                <input type="checkbox" style={cb} checked={allVariantsOf(model,type_)}
                  ref={el=>{if(el) el.indeterminate=someVariantsOf(model,type_)&&!allVariantsOf(model,type_);}}
                  onChange={()=>toggleType(model,type_)}/>
                <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:type_.active?'var(--text1)':'var(--text3)'}}>{type_.name}</span>
                {!type_.active&&<span style={{fontSize:9,color:'var(--text3)',fontStyle:'italic'}}>arch.</span>}
              </label>
              <div style={{paddingLeft:16,marginTop:2,display:'flex',flexDirection:'column',gap:2}}>
                {type_.variants.map(v=>(
                  <label key={v.name} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',userSelect:'none'}}>
                    <input type="checkbox" style={cb} checked={selSet.has(mkKey(model.name,type_.name,v.name))} onChange={()=>toggleVariant(model.name,type_.name,v.name)}/>
                    <span style={{fontFamily:'var(--mono)',fontSize:11,color:v.active?'var(--text2)':'var(--text3)'}}>{v.name}</span>
                    {!v.active&&<span style={{fontSize:9,color:'var(--text3)',fontStyle:'italic'}}>arch.</span>}
                  </label>
                ))}
              </div>
            </div>
          ))}
        </div>
      </div>
    ))}
  </div>;
}
/* ── FilterTree — drzewko checkbox type→variant ── */
function FilterTree({tree,selected,onSelect}) {
  const selSet=new Set(selected);
  const mk=(sc,v)=>`${sc}:${v}`;
  const allOf=node=>node.variants.length>0&&node.variants.every(v=>selSet.has(mk(node.name,v.name)));
  const someOf=node=>node.variants.some(v=>selSet.has(mk(node.name,v.name)));
  const toggleType=node=>{
    const all=allOf(node); const next=new Set(selSet);
    node.variants.forEach(v=>{const k=mk(node.name,v.name);all?next.delete(k):next.add(k);});
    onSelect([...next]);
  };
  const togglePair=(sc,v)=>{const k=mk(sc,v);const next=new Set(selSet);next.has(k)?next.delete(k):next.add(k);onSelect([...next]);};
  const cb={width:13,height:13,accentColor:'var(--amber)',cursor:'pointer',flexShrink:0};
  return <div style={{fontSize:12}}>
    {tree.map(node=>(
      <div key={node.name} style={{marginBottom:5}}>
        <label style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',userSelect:'none'}}>
          <input type="checkbox" style={cb} checked={allOf(node)}
            ref={el=>{if(el) el.indeterminate=someOf(node)&&!allOf(node);}}
            onChange={()=>toggleType(node)}/>
          <span style={{fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:node.active?'var(--text1)':'var(--text3)'}}>{node.name}</span>
          {!node.active&&<span style={{fontSize:9,color:'var(--text3)',fontStyle:'italic'}}>arch.</span>}
        </label>
        <div style={{paddingLeft:20,marginTop:2,display:'flex',flexDirection:'column',gap:2}}>
          {node.variants.map(v=>(
            <label key={v.name} style={{display:'flex',alignItems:'center',gap:6,cursor:'pointer',userSelect:'none'}}>
              <input type="checkbox" style={cb} checked={selSet.has(mk(node.name,v.name))} onChange={()=>togglePair(node.name,v.name)}/>
              <span style={{fontFamily:'var(--mono)',fontSize:11,color:v.active?'var(--text2)':'var(--text3)'}}>{v.name}</span>
              {!v.active&&<span style={{fontSize:9,color:'var(--text3)',fontStyle:'italic'}}>arch.</span>}
            </label>
          ))}
        </div>
      </div>
    ))}
  </div>;
}

      const vs=[...new Set(selectedPairs.map(x=>x.split(':')[1]||'baseline'))];
      p.set('variants',vs.join(','));
    }
    if(periodMode==='custom'){
      if(dateFrom) p.set('date_from',dateFrom);
      if(dateTo) p.set('date_to',dateTo);
    } else if(periodMode==='from'){
      if(dateFrom){
        p.set('date_from',dateFrom);
        const d=new Date(dateFrom); d.setDate(d.getDate()+Math.max(1,fromDays));
        p.set('date_to',d.toISOString().slice(0,10));
      }
    } else {
      const days={'7d':7,'14d':14,'30d':30,'90d':90,'6m':180,'12m':365,'all':0}[periodMode]||30;
      if(days>0){
        const d=new Date(); d.setDate(d.getDate()-days);
        p.set('date_from',d.toISOString().slice(0,10));
      }
    }
    if(minRegimeScore!=='') p.set('min_regime_score',minRegimeScore);
    fetch('/api/simulator?'+p.toString())
      .then(r=>r.ok?r.json():[])
      .then(data=>{
        const selectedTypes=new Set(selectedPairs.map(x=>x.split(':')[0]));
        const selectedVars=new Set(selectedPairs.map(x=>x.split(':')[1]||'baseline'));
        const filtered=data.filter(t=>{
          const tp=t.type||'';
          const vr=t.variant||'baseline';
          return selectedTypes.has(tp)&&selectedVars.has(vr);
        });
        setTrades(filtered);
      })
      .catch(()=>setTrades([]))
      .finally(()=>setLoading(false));
  },[selectedPairs,allTreePairs,periodMode,dateFrom,dateTo,fromDays,minRegimeScore]);

  useEffect(()=>{runSim();},[selectedPairs,periodMode,dateFrom,dateTo,fromDays,minRegimeScore]);

  const simulation=React.useMemo(()=>{
    if(!trades||trades.length===0) return null;
    let capital=startCapital;
    let currentExitTime=null;
    let blockingId=null;
    const steps=[];
    let wins=0,losses=0,skipped=0;
    let maxCapital=capital,maxDrawdown=0;
    let totalWithdrawn=0;
    let capitalAtPeriodStart=startCapital;
    let nextWithdrawTs=null;

    const calcNextWithdraw=(fromMs)=>{
      const d=new Date(fromMs);
      if(withdrawMode==='weekly'){
        const daysUntilThu=(4-d.getDay()+7)%7||7;
        const thu=new Date(d);
        thu.setDate(thu.getDate()+daysUntilThu);
        thu.setHours(8,0,0,0);
        return thu.getTime();
      } else {
        let target=new Date(d.getFullYear(),d.getMonth(),withdrawDay,8,0,0,0);
        if(target.getTime()<=fromMs)
          target=new Date(d.getFullYear(),d.getMonth()+1,withdrawDay,8,0,0,0);
        return target.getTime();
      }
    };

    const tryWithdraw=(currentTime)=>{
      if(!withdrawEnabled) return;
      if(nextWithdrawTs===null) nextWithdrawTs=calcNextWithdraw(currentTime);
      while(currentTime>=nextWithdrawTs){
        const profit=capital-capitalAtPeriodStart;
        if(profit>0){
          const amount=Math.round(profit*withdrawPct/100*100)/100;
          totalWithdrawn+=amount;
          const prevCap=capital;
          capital=capital-amount;
          capitalAtPeriodStart=capital;
          steps.push({isWithdrawal:true,
            withdraw_amount:amount,withdraw_profit:Math.round(profit*100)/100,
            withdraw_time:new Date(nextWithdrawTs).toISOString(),
            capital_before:Math.round(prevCap*100)/100,
            capital_after:Math.round(capital*100)/100,
            entry_ts:nextWithdrawTs,exit_ts:nextWithdrawTs});
        } else {
          capitalAtPeriodStart=capital;
        }
        nextWithdrawTs=calcNextWithdraw(nextWithdrawTs);
      }
    };

    for(const t of trades){
      const entryTime=new Date(t.entry_time).getTime();
      const exitTime=new Date(t.exit_time).getTime();
      const pnlPct=parseFloat(pnlMode==='tp1'?t.tp1_only_pnl_pct:t.pnl_pct);
      const base={id:t.setup_id,type:t.type,variant:t.variant||'baseline',
        direction:t.direction,result:t.result,
        entry_time:t.entry_time,exit_time:t.exit_time,
        entry_ts:entryTime,exit_ts:exitTime};

      tryWithdraw(entryTime);

      if(currentExitTime&&entryTime<currentExitTime){
        skipped++;
        steps.push({...base,skipped:true,blocked_by:blockingId,
          pnl_pct:isNaN(pnlPct)?0:pnlPct,pnl_usd:0,
          capital_before:Math.round(capital*100)/100,
          capital_after:Math.round(capital*100)/100});
        continue;
      }
      currentExitTime=exitTime;
      blockingId=t.setup_id;
      if(isNaN(pnlPct)) continue;
      const pnlUsd=capital*(pnlPct/100);
      const prevCapital=capital;
      capital=capital+pnlUsd;
      if(capital>maxCapital) maxCapital=capital;
      const dd=(maxCapital-capital)/maxCapital*100;
      if(dd>maxDrawdown) maxDrawdown=dd;
      if(pnlPct>0) wins++; else losses++;
      steps.push({...base,skipped:false,
        pnl_pct:pnlPct,pnl_usd:Math.round(pnlUsd*100)/100,
        capital_before:Math.round(prevCapital*100)/100,
        capital_after:Math.round(capital*100)/100});
    }
    return {
      steps,final:Math.round(capital*100)/100,
      totalReturn:Math.round((capital-startCapital+totalWithdrawn)/startCapital*10000)/100,
      wins,losses,skipped,maxDrawdown:Math.round(maxDrawdown*100)/100,
      totalWithdrawn:Math.round(totalWithdrawn*100)/100,
      withdrawCount:steps.filter(s=>s.isWithdrawal).length,
    };
  },[trades,startCapital,pnlMode,withdrawEnabled,withdrawMode,withdrawPct,withdrawDay]);

  const fmtD=(s)=>s?String(s).replace('T',' ').slice(0,16):'—';
  const pnlC=(v)=>v>0?'var(--green)':v<0?'var(--red)':'var(--text3)';

  return (
    <>
      <div className="panel" style={{flexShrink:0}}>
        <div className="panel-head">
          <span className="panel-title">Symulator portfela</span>
          <span className="panel-badge">Co by było gdyby…</span>
        </div>
        <div style={{padding:'12px 16px',display:'flex',flexDirection:'column',gap:10}}>
          <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',minWidth:50}}>Okres:</span>
            <div className="seg-tabs">
              {['7d','14d','30d','90d','6m','12m','all','from','custom'].map(p=>
                <div key={p} className={`seg-tab ${periodMode===p?'active':''}`}
                  onClick={()=>setPeriodMode(p)}>{p==='custom'?'daty':p==='from'?'od daty':p}</div>
              )}
            </div>
          </div>
          {periodMode==='from'&&<div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>Od:</span>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}
              style={{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:4,padding:'4px 8px',color:'var(--text1)',fontFamily:'var(--mono)',fontSize:12}}/>
            <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>przez</span>
            <input type="number" min={1} max={3650} value={fromDays} onChange={e=>setFromDays(Math.max(1,Number(e.target.value)||1))}
              style={{width:60,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:4,padding:'4px 8px',color:'var(--text1)',fontFamily:'var(--mono)',fontSize:12,textAlign:'right'}}/>
            <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>dni</span>
            {dateFrom&&<span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>
              → {new Date(new Date(dateFrom).getTime()+fromDays*86400000).toISOString().slice(0,10)}
            </span>}
          </div>}
          {periodMode==='custom'&&<div style={{display:'flex',gap:8,alignItems:'center'}}>
            <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>Od:</span>
            <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)}
              style={{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:4,padding:'4px 8px',color:'var(--text1)',fontFamily:'var(--mono)',fontSize:12}}/>
            <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>Do:</span>
            <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)}
              style={{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:4,padding:'4px 8px',color:'var(--text1)',fontFamily:'var(--mono)',fontSize:12}}/>
          </div>}
          <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',minWidth:50}}>Kapitał:</span>
            <div style={{display:'flex',gap:4}}>
              {[500,1000,2000,5000].map(v=>
                <div key={v} className={`filter-chip ${startCapital===v?'active':''}`}
                  onClick={()=>setStartCapital(v)}>${v}</div>
              )}
            </div>
            <input type="number" value={startCapital} onChange={e=>setStartCapital(Math.max(1,Number(e.target.value)||1))}
              style={{width:80,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:4,padding:'4px 8px',color:'var(--text1)',fontFamily:'var(--mono)',fontSize:12,textAlign:'right'}}/>
            <span style={{fontSize:10,color:'var(--text3)'}}>USDT</span>
          </div>
          <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',minWidth:50}}>Model:</span>
            <div className="seg-tabs">
              <div className={`seg-tab ${pnlMode==='tp12'?'active':''}`} onClick={()=>setPnlMode('tp12')}>TP1+TP2</div>
              <div className={`seg-tab ${pnlMode==='tp1'?'active':''}`} onClick={()=>setPnlMode('tp1')}>TP1 only</div>
            </div>
            <span style={{fontSize:9,color:'var(--text3)',fontStyle:'italic'}}>{pnlMode==='tp1'?'Cały wolumen wychodzi na TP1':'Połowa na TP1, połowa na TP2'}</span>
          </div>
          <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',minWidth:50}}>Regime:</span>
            <div style={{display:'flex',gap:4}}>
              {['',1,2,3,4,5].map(v=>
                <div key={v} className={`filter-chip ${minRegimeScore===v?'active':''}`}
                  onClick={()=>setMinRegimeScore(v)}>{v===''?'Wszystkie':`≥${v}`}</div>
              )}
            </div>
            <span style={{fontSize:9,color:'var(--text3)',fontStyle:'italic'}}>{minRegimeScore!==''?`Tylko setupy z regime score ≥ ${minRegimeScore}`:'Bez filtra siły reżimu'}</span>
          </div>
          <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',minWidth:50}}>Wypłaty:</span>
            <div className={`filter-chip ${withdrawEnabled?'active':''}`}
              onClick={()=>setWithdrawEnabled(p=>!p)}>{withdrawEnabled?'Włączone':'Wyłączone'}</div>
            {withdrawEnabled&&<>
              <div className="seg-tabs">
                <div className={`seg-tab ${withdrawMode==='weekly'?'active':''}`} onClick={()=>setWithdrawMode('weekly')}>Co czwartek</div>
                <div className={`seg-tab ${withdrawMode==='monthly'?'active':''}`} onClick={()=>setWithdrawMode('monthly')}>Co miesiąc</div>
              </div>
              <div style={{display:'flex',gap:4,alignItems:'center'}}>
                <input type="number" min="1" max="100" value={withdrawPct}
                  onChange={e=>setWithdrawPct(Math.min(100,Math.max(1,Number(e.target.value)||1)))}
                  style={{width:50,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:4,padding:'4px 6px',color:'var(--text1)',fontFamily:'var(--mono)',fontSize:12,textAlign:'right'}}/>
                <span style={{fontSize:10,color:'var(--text3)'}}>% zysku</span>
              </div>
              {withdrawMode==='monthly'&&<div style={{display:'flex',gap:4,alignItems:'center'}}>
                <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>dzień:</span>
                <input type="number" min="1" max="28" value={withdrawDay}
                  onChange={e=>setWithdrawDay(Math.min(28,Math.max(1,Number(e.target.value)||1)))}
                  style={{width:40,background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:4,padding:'4px 6px',color:'var(--text1)',fontFamily:'var(--mono)',fontSize:12,textAlign:'right'}}/>
              </div>}
              <span style={{fontSize:9,color:'var(--text3)',fontStyle:'italic'}}>
                {withdrawMode==='weekly'?`${withdrawPct}% zysku wypłacane po każdym czwartku`:`${withdrawPct}% zysku wypłacane po ${withdrawDay}. dniu miesiąca`}
              </span>
            </>}
          </div>
          {filterTree.length>0&&selectedPairs!==null&&<div style={{display:'flex',gap:4,flexWrap:'wrap',alignItems:'center'}}>
            <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)',minWidth:50}}>Typy:</span>
            <div className={`filter-chip ${showTypeFilter?'active':''}`} style={{fontFamily:'var(--mono)',fontSize:9}} onClick={()=>setShowTypeFilter(p=>!p)}>
              Typ/Wariant{pairsFiltered?' (filtr)':''} {showTypeFilter?'▴':'▾'}
            </div>
            {pairsFiltered&&<span style={{color:'var(--blue)',fontSize:10,cursor:'pointer',padding:'3px 4px'}} onClick={()=>setSelectedPairs(allTreePairs)}>✕ wyczyść</span>}
          </div>}
          {showTypeFilter&&filterTree.length>0&&selectedPairs!==null&&<div style={{padding:'6px 0',borderTop:'1px solid var(--border)',maxHeight:280,overflowY:'auto'}}>
            <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
              {settingsFilter&&settingsFilter.pairs.length>0&&<span className="filter-chip" style={{fontSize:10}} onClick={()=>{const s=new Set(settingsFilter.pairs);setSelectedPairs(allTreePairs.filter(p=>s.has(p)));}}>tylko włączone</span>}
              <span className="filter-chip" style={{fontSize:10,opacity:.6}} onClick={()=>setSelectedPairs(allTreePairs)}>wszystkie</span>
              <span className="filter-chip" style={{fontSize:10,opacity:.35}} onClick={()=>setSelectedPairs([])}>✕ wyczyść</span>
            </div>
            {filterTree.map(sc=><div key={sc.name} style={{marginBottom:6}}>
              <div style={{fontSize:10,fontWeight:700,color:'var(--text2)',fontFamily:'var(--mono)',marginBottom:3,padding:'0 4px'}}>{sc.name}</div>
              <div style={{display:'flex',gap:4,flexWrap:'wrap',paddingLeft:8}}>
                {sc.variants.map(v=>{
                  const pair=`${sc.name}:${v.name}`;
                  const sel=selectedPairs.includes(pair);
                  return <div key={v.name} className={`filter-chip ${sel?'active':''}`} style={{fontSize:10,opacity:v.active?1:.4}}
                    onClick={()=>setSelectedPairs(p=>sel?p.filter(x=>x!==pair):[...p,pair])}>{v.name}</div>;
                })}
              </div>
            </div>)}
          </div>}
        </div>
      </div>

      {loading&&<div style={{textAlign:'center',padding:20,color:'var(--text3)',fontFamily:'var(--mono)',fontSize:12}}>Ładowanie…</div>}

      {simulation&&!loading&&<>
        <div className="panel" style={{flexShrink:0}}>
          <div className="panel-head">
            <span className="panel-title">Wynik symulacji</span>
            <span className="panel-badge">{simulation.steps.length} pozycji</span>
          </div>
          <div className="quick-stat-grid">
            <div className="qs-cell">
              <div className="qs-val" style={{color:pnlC(simulation.final-startCapital)}}>${simulation.final.toLocaleString('en',{minimumFractionDigits:2})}</div>
              <div className="qs-lbl">Kapitał końcowy</div>
            </div>
            <div className="qs-cell">
              <div className="qs-val" style={{color:pnlC(simulation.totalReturn)}}>{simulation.totalReturn>0?'+':''}{simulation.totalReturn}%</div>
              <div className="qs-lbl">Zwrot</div>
            </div>
            <div className="qs-cell">
              <div className="qs-val" style={{color:'var(--green)'}}>{simulation.wins}</div>
              <div className="qs-lbl">Wygrane</div>
            </div>
            <div className="qs-cell">
              <div className="qs-val" style={{color:'var(--red)'}}>{simulation.losses}</div>
              <div className="qs-lbl">Przegrane</div>
            </div>
            <div className="qs-cell">
              <div className="qs-val" style={{color:'var(--text1)'}}>{simulation.wins+simulation.losses>0?Math.round(simulation.wins/(simulation.wins+simulation.losses)*100):0}%</div>
              <div className="qs-lbl">Win Rate</div>
            </div>
            <div className="qs-cell">
              <div className="qs-val" style={{color:'var(--red)'}}>{simulation.maxDrawdown>0?`-${simulation.maxDrawdown}%`:'0%'}</div>
              <div className="qs-lbl">Max Drawdown</div>
            </div>
            <div className="qs-cell">
              <div className="qs-val dim">{simulation.skipped}</div>
              <div className="qs-lbl">Pominięte (zajęta poz.)</div>
            </div>
            <div className="qs-cell">
              <div className="qs-val" style={{color:pnlC(simulation.final-startCapital)}}>{simulation.final>=startCapital?'+':''}${(simulation.final-startCapital).toFixed(2)}</div>
              <div className="qs-lbl">Zysk / Strata $</div>
            </div>
            {simulation.totalWithdrawn>0&&<>
              <div className="qs-cell">
                <div className="qs-val" style={{color:'var(--blue)'}}>${simulation.totalWithdrawn.toLocaleString('en',{minimumFractionDigits:2})}</div>
                <div className="qs-lbl">Suma wypłat ({simulation.withdrawCount}x)</div>
              </div>
              <div className="qs-cell">
                <div className="qs-val" style={{color:'var(--green)'}}>${(simulation.final+simulation.totalWithdrawn).toLocaleString('en',{minimumFractionDigits:2})}</div>
                <div className="qs-lbl">Kapitał + wypłaty</div>
              </div>
            </>}
          </div>
        </div>

        <div className="panel" style={{minHeight:120,flexShrink:0}}>
          <div className="panel-head">
            <span className="panel-title">Krzywa kapitału</span>
          </div>
          <div style={{padding:16}}>
            <SimChart steps={simulation.steps} startCapital={startCapital}/>
          </div>
        </div>

        <div className="panel" style={{minHeight:120,flexShrink:0}}>
          <div className="panel-head">
            <span className="panel-title">Timeline pozycji</span>
            <span className="panel-badge">{simulation.steps.length} total · {simulation.skipped} pominięte</span>
          </div>
          <div style={{padding:16}}>
            <SimTimeline steps={simulation.steps}/>
          </div>
        </div>

        <div className="panel" style={{flex:1,minHeight:200}}>
          <div className="panel-head">
            <span className="panel-title">Historia pozycji</span>
            <span className="panel-badge">{simulation.steps.filter(s=>!s.skipped).length} wykonane · {simulation.skipped} pominięte</span>
          </div>
          <div className="panel-body scroll-y">
            <table className="tbl">
              <thead><tr>
                <th></th><th>#</th><th>ID</th><th>Typ</th><th>Kier.</th><th>Wynik</th>
                <th>Wejście</th><th>Wyjście</th>
                <th>PnL %</th><th>PnL $</th><th>Kapitał po</th>
              </tr></thead>
              <tbody>
                {simulation.steps.map((s,i)=>{
                  if(s.isWithdrawal) return (
                    <tr key={'w-'+i} style={{background:'var(--blue-dim)'}}>
                      <td style={{width:20,textAlign:'center'}}><span style={{color:'var(--blue)',fontSize:13}}>💸</span></td>
                      <td style={{color:'var(--text3)',fontFamily:'var(--mono)'}}></td>
                      <td colSpan={3} style={{fontFamily:'var(--mono)',fontWeight:600,color:'var(--blue)',fontSize:11}}>
                        WYPŁATA — {withdrawPct}% zysku (${s.withdraw_profit})
                      </td>
                      <td style={{fontFamily:'var(--mono)',fontWeight:600,color:'var(--blue)'}}></td>
                      <td style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>{fmtD(s.withdraw_time)}</td>
                      <td></td>
                      <td style={{fontFamily:'var(--mono)',fontWeight:600,color:'var(--blue)'}}>-${s.withdraw_amount.toFixed(2)}</td>
                      <td></td>
                      <td style={{fontFamily:'var(--mono)',fontWeight:600,color:'var(--text1)'}}>${s.capital_after.toLocaleString('en',{minimumFractionDigits:2})}</td>
                    </tr>
                  );
                  const sk=s.skipped;
                  const opacity=sk?0.35:1;
                  const rowStyle={opacity};
                  return (
                  <tr key={s.id+'-'+i} style={rowStyle}>
                    <td style={{width:20,textAlign:'center'}}>{sk?<span title={`Pominięta — blokowana przez #${s.blocked_by}`} style={{color:'var(--amber)',fontSize:13,cursor:'help'}}>⏸</span>:<span style={{color:'var(--green)',fontSize:11}}>✓</span>}</td>
                    <td style={{color:'var(--text3)',fontFamily:'var(--mono)'}}>{i+1}</td>
                    <td style={{fontFamily:'var(--mono)',fontWeight:600}}>{s.id}</td>
                    <td style={{fontSize:11}}>{s.type}<span style={{color:'var(--text3)',fontSize:9,marginLeft:4}}>{s.variant}</span></td>
                    <td><span className={`kier-badge ${s.direction}`}>{s.direction}</span></td>
                    <td style={{fontFamily:'var(--mono)',fontWeight:600,color:sk?'var(--text3)':s.result==='SL'?'var(--red)':'var(--green)'}}>{s.result}{sk&&<span style={{color:'var(--amber)',fontSize:9,marginLeft:4}}>skip #{s.blocked_by}</span>}</td>
                    <td style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>{fmtD(s.entry_time)}</td>
                    <td style={{fontFamily:'var(--mono)',fontSize:11,color:'var(--text2)'}}>{fmtD(s.exit_time)}</td>
                    <td style={{fontFamily:'var(--mono)',fontWeight:600,color:sk?'var(--text3)':pnlC(s.pnl_pct)}}>{sk?'—':`${s.pnl_pct>0?'+':''}${s.pnl_pct.toFixed(2)}%`}</td>
                    <td style={{fontFamily:'var(--mono)',fontWeight:600,color:sk?'var(--text3)':pnlC(s.pnl_usd)}}>{sk?'—':`${s.pnl_usd>0?'+':''}$${s.pnl_usd.toFixed(2)}`}</td>
                    <td style={{fontFamily:'var(--mono)',fontWeight:600,color:sk?'var(--text3)':pnlC(s.capital_after-s.capital_before)}}>${s.capital_after.toLocaleString('en',{minimumFractionDigits:2})}</td>
                  </tr>);
                })}
              </tbody>
            </table>
          </div>
        </div>
      </>}
