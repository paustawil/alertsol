function SimChart({steps,startCapital}) {
  const canvasRef=React.useRef(null);
  React.useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas||steps.length===0) return;
    const ctx=canvas.getContext('2d');
    const dpr=window.devicePixelRatio||1;
    const rect=canvas.parentElement.getBoundingClientRect();
    const W=rect.width, H=200;
    canvas.width=W*dpr; canvas.height=H*dpr;
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,W,H);

    const nonSkipped=steps.filter(s=>!s.skipped);
    const points=[startCapital,...nonSkipped.map(s=>s.capital_after)];
    const minV=Math.min(...points)*0.98;
    const maxV=Math.max(...points)*1.02;
    const range=maxV-minV||1;
    const padL=50,padR=16,padT=12,padB=24;
    const cW=W-padL-padR, cH=H-padT-padB;
    const xStep=cW/(points.length-1||1);

    ctx.strokeStyle='var(--border2)';ctx.lineWidth=0.5;
    ctx.fillStyle='var(--text3)';ctx.font='9px IBM Plex Mono';ctx.textAlign='right';
    for(let i=0;i<=4;i++){
      const y=padT+cH*(1-i/4);
      const v=minV+range*(i/4);
      ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(W-padR,y);ctx.stroke();
      ctx.fillText('$'+v.toFixed(0),padL-4,y+3);
    }

    ctx.beginPath();
    ctx.strokeStyle='#4a9eff';ctx.lineWidth=2;
    points.forEach((v,i)=>{
      const x=padL+i*xStep;
      const y=padT+cH*(1-(v-minV)/range);
      i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);
    });
    ctx.stroke();

    ctx.beginPath();
    const last=points[points.length-1];
    ctx.strokeStyle=last>=startCapital?'#00d68f44':'#ff4d6a44';
    ctx.setLineDash([4,4]);ctx.lineWidth=1;
    const baseY=padT+cH*(1-(startCapital-minV)/range);
    ctx.moveTo(padL,baseY);ctx.lineTo(W-padR,baseY);ctx.stroke();
    ctx.setLineDash([]);

    points.forEach((v,i)=>{
      const x=padL+i*xStep;
      const y=padT+cH*(1-(v-minV)/range);
      ctx.beginPath();ctx.arc(x,y,2.5,0,Math.PI*2);
      const isW=i>0&&nonSkipped[i-1]&&nonSkipped[i-1].isWithdrawal;
      ctx.fillStyle=isW?'#4a9eff':v>=startCapital?'#00d68f':'#ff4d6a';ctx.fill();
      if(isW){
        ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);
        ctx.strokeStyle='#4a9eff66';ctx.lineWidth=1;ctx.stroke();
      }
    });
  },[steps,startCapital]);

  return <canvas ref={canvasRef} style={{width:'100%',height:200,display:'block'}}/>;
}

function SimTimeline({steps}) {
  const posSteps=React.useMemo(()=>steps.filter(s=>!s.isWithdrawal),[steps]);
  const canvasRef=React.useRef(null);
  const containerRef=React.useRef(null);
  React.useEffect(()=>{
    const canvas=canvasRef.current;
    if(!canvas||posSteps.length===0) return;
    const ctx=canvas.getContext('2d');
    const dpr=window.devicePixelRatio||1;
    const rect=canvas.parentElement.getBoundingClientRect();

    const ROW_H=18, padL=60, padR=20, padT=24, padB=20;
    const H=padT+posSteps.length*ROW_H+padB;
    const W=rect.width;
    canvas.width=W*dpr; canvas.height=H*dpr;
    canvas.style.width=W+'px'; canvas.style.height=H+'px';
    ctx.scale(dpr,dpr);
    ctx.clearRect(0,0,W,H);

    const allTs=posSteps.flatMap(s=>[s.entry_ts,s.exit_ts]);
    const minT=Math.min(...allTs), maxT=Math.max(...allTs);
    const rangeT=maxT-minT||1;
    const cW=W-padL-padR;
    const toX=(ts)=>padL+(ts-minT)/rangeT*cW;

    ctx.fillStyle='#6b7fa3';ctx.font='9px IBM Plex Mono';ctx.textAlign='center';
    const tickCount=Math.min(8,Math.floor(cW/80));
    for(let i=0;i<=tickCount;i++){
      const ts=minT+rangeT*(i/tickCount);
      const x=toX(ts);
      const d=new Date(ts);
      const label=`${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      ctx.strokeStyle='#1a284033';ctx.lineWidth=0.5;
      ctx.beginPath();ctx.moveTo(x,padT);ctx.lineTo(x,H-padB);ctx.stroke();
      ctx.fillText(label,x,padT-8);
    }

    posSteps.forEach((s,i)=>{
      const y=padT+i*ROW_H+ROW_H/2;
      const x1=toX(s.entry_ts), x2=toX(s.exit_ts);
      const barW=Math.max(x2-x1,3);

      if(s.skipped){
        ctx.fillStyle='#f5a62330';
        ctx.strokeStyle='#f5a62366';
        ctx.setLineDash([3,3]);
      } else {
        const isWin=s.pnl_pct>0;
        ctx.fillStyle=isWin?'#00d68f33':'#ff4d6a33';
        ctx.strokeStyle=isWin?'#00d68f99':'#ff4d6a99';
        ctx.setLineDash([]);
      }
      ctx.fillRect(x1,y-5,barW,10);
      ctx.strokeRect(x1,y-5,barW,10);
      ctx.setLineDash([]);

      ctx.fillStyle=s.skipped?'#f5a623':'#8a9bbf';
      ctx.font='8px IBM Plex Mono';ctx.textAlign='right';
      ctx.fillText(`#${s.id}`,padL-4,y+3);

      if(barW>30){
        ctx.fillStyle=s.skipped?'#f5a623aa':'#e8edf5cc';
        ctx.font='8px IBM Plex Mono';ctx.textAlign='left';
        const lbl=s.skipped?'skip':`${s.pnl_pct>0?'+':''}${s.pnl_pct.toFixed(1)}%`;
        ctx.fillText(lbl,x1+3,y+3);
      }
    });
  },[posSteps]);

  const H=24+posSteps.length*18+20;
  return <div ref={containerRef} style={{overflowX:'auto',overflowY:'auto',maxHeight:400}}>
    <canvas ref={canvasRef} style={{width:'100%',height:H,display:'block',minWidth:400}}/>
  </div>;
}

                  {trainResult.top_features.map((f,i) => {
                    const maxImp = trainResult.top_features[0].importance || 1;
                    const pct = Math.round(f.importance / maxImp * 100);
                    return (
                      <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                        <span style={{width:180,color:'var(--text2)',flexShrink:0}}>{f.name}</span>
                        <div style={{flex:1,height:6,background:'var(--bg1)',borderRadius:3,overflow:'hidden'}}>
                          <div style={{width:`${pct}%`,height:'100%',background:'var(--blue)',borderRadius:3}}/>
                        </div>
                        <span style={{width:40,textAlign:'right',color:'var(--text3)',fontSize:10}}>{f.importance}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Aktualny model */}
      <div style={sCard}>
        <div style={sH}>Aktualny model</div>
        {!mi ? <div style={{color:'var(--text3)',fontSize:12,fontFamily:'var(--mono)'}}>Ładowanie…</div>
         : mi.status==='no_model' ? <div style={{color:'var(--text3)',fontSize:12,fontFamily:'var(--mono)'}}>{mi.message}</div>
         : mi.status==='error' ? <div style={{color:'var(--red)',fontSize:12,fontFamily:'var(--mono)'}}>{mi.message}</div>
         : (
          <div style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--text2)'}}>
            <div style={{display:'flex',gap:24,flexWrap:'wrap',marginBottom:12}}>
              <span>Wytrenowany: <span style={{color:'var(--text1)'}}>{mi.trained_at ? new Date(mi.trained_at).toLocaleString('pl-PL') : '—'}</span></span>
              <span>Próbki: <span style={{color:'var(--text1)'}}>{mi.n_samples}</span> ({mi.n_wins}W / {mi.n_losses}L)</span>
              <span>Features: <span style={{color:'var(--text1)'}}>{mi.features}</span></span>
              <span>Market context: <span style={{color:mi.has_market_context?'var(--green)':'var(--text3)'}}>{mi.has_market_context?'tak':'nie'}</span></span>
            </div>
            {mi.avg_metrics && (
              <div style={{display:'flex',gap:16,flexWrap:'wrap',marginBottom:16}}>
                <span>Accuracy: <span style={{color:'var(--text1)'}}>{(mi.avg_metrics.accuracy*100).toFixed(1)}%</span></span>
                <span>Precision: <span style={{color:'var(--text1)'}}>{(mi.avg_metrics.precision*100).toFixed(1)}%</span></span>
                <span>Recall: <span style={{color:'var(--text1)'}}>{(mi.avg_metrics.recall*100).toFixed(1)}%</span></span>
                <span>F1: <span style={{color:'var(--text1)'}}>{(mi.avg_metrics.f1*100).toFixed(1)}%</span></span>
                <span>AUC: <span style={{color:'var(--text1)'}}>{mi.avg_metrics.auc?.toFixed(3)}</span></span>
              </div>
            )}
            {mi.top_features && mi.top_features.length > 0 && (
              <div>
                <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--text3)',marginBottom:8}}>Najważniejsze czynniki</div>
                <div style={{fontSize:11,fontFamily:'var(--mono)'}}>
                  {mi.top_features.map((f,i) => {
                    const maxImp = mi.top_features[0].importance || 1;
                    const pct = Math.round(f.importance / maxImp * 100);
                    return (
                      <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                        <span style={{width:180,color:'var(--text2)',flexShrink:0}}>{f.name}</span>
                        <div style={{flex:1,height:6,background:'var(--bg1)',borderRadius:3,overflow:'hidden'}}>
                          <div style={{width:`${pct}%`,height:'100%',background:'var(--blue)',borderRadius:3}}/>
                        </div>
                        <span style={{width:40,textAlign:'right',color:'var(--text3)',fontSize:10}}>{f.importance}</span>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Analiza cech */}
      <div style={sCard}>
        <div style={sH}>Analiza cech — co przewiduje wygraną?</div>
        <button onClick={() => {
          setLoadingAnalysis(true); setError(null);
          fetch('/api/ml/feature-analysis').then(r=>r.json())
            .then(d => { if(d.status==='error') setError(d.message); else setFeatureAnalysis(d); })
            .catch(e => setError(`Błąd: ${e}`))
            .finally(() => setLoadingAnalysis(false));
        }} disabled={loadingAnalysis} style={{padding:'8px 24px',fontSize:12,fontWeight:700,fontFamily:'var(--mono)',borderRadius:6,border:'1px solid var(--blue)',background:loadingAnalysis?'transparent':'var(--blue-dim)',color:'var(--blue)',cursor:loadingAnalysis?'not-allowed':'pointer',opacity:loadingAnalysis?0.5:1}}>
          {loadingAnalysis ? 'Ładowanie…' : 'Załaduj analizę'}
        </button>
        {featureAnalysis && featureAnalysis.status==='ok' && (
          <div style={{marginTop:20}}>
            <div style={{fontSize:11,fontFamily:'var(--mono)',color:'var(--text2)',marginBottom:16}}>
              Setupy: {featureAnalysis.total} ({featureAnalysis.wins}W / {featureAnalysis.losses}L) · Średni win rate: {featureAnalysis.avg_win_rate}%
            </div>
            {Object.entries(featureAnalysis.analyses).map(([key, analysis]) => (
              <div key={key} style={{marginBottom:20}}>
                <div style={{fontSize:10,fontWeight:700,textTransform:'uppercase',letterSpacing:'.08em',color:'var(--text3)',marginBottom:8}}>{analysis.label}</div>
                <div style={{fontSize:11,fontFamily:'var(--mono)'}}>
                  {analysis.data.map((row, i) => {
                    const barColor = row.win_rate >= 40 ? 'var(--green)' : row.win_rate >= 25 ? 'var(--yellow, #f0b429)' : 'var(--red)';
                    return (
                      <div key={i} style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                        <span style={{width:140,color:'var(--text2)',flexShrink:0,textOverflow:'ellipsis',overflow:'hidden',whiteSpace:'nowrap'}}>{row.value}</span>
                        <div style={{flex:1,height:6,background:'var(--bg1)',borderRadius:3,overflow:'hidden'}}>
                          <div style={{width:`${row.win_rate}%`,height:'100%',background:barColor,borderRadius:3}}/>
                        </div>
                        <span style={{width:100,textAlign:'right',color:'var(--text3)',fontSize:10,flexShrink:0}}>
                          {row.win_rate}% ({row.wins}W/{row.losses}L)
                        </span>
                      </div>
                    );
                  })}
                </div>
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}
function ViewSettings() {
  const [cfg, setCfg] = React.useState(null);
  const [saving, setSaving] = React.useState(false);
  const [msg, setMsg] = React.useState(null);

  React.useEffect(() => {
    fetch('/api/settings').then(r => r.json()).then(d => {
      setCfg({
        trade_usdt:   String(d.trade_usdt ?? 100),
        leverage:     String(d.leverage ?? 20),
        max_positions: String(d.max_positions ?? 5),
        type_configs: Object.fromEntries(
          ALGO2_TYPES.map(t => {
            const saved = (d.type_configs || {})[t.key] || {};
            return [t.key, {
              enabled:     saved.enabled === true,
              trade_usdt:  saved.trade_usdt  != null ? String(saved.trade_usdt) : '',
              leverage:    saved.leverage    != null ? String(saved.leverage)   : '',
              tp_strategy: saved.tp_strategy || '',
            }];
          })
        ),
      });
    }).catch(() => setMsg({ ok: false, text: 'Błąd ładowania ustawień' }));
  }, []);

  const save = async () => {
    setSaving(true); setMsg(null);
    const type_configs = {};
    ALGO2_TYPES.forEach(t => {
      const c = cfg.type_configs[t.key];
      type_configs[t.key] = {
        enabled:     c.enabled,
        trade_usdt:  c.trade_usdt  !== '' ? parseFloat(c.trade_usdt) : null,
        leverage:    c.leverage    !== '' ? parseInt(c.leverage)     : null,
        tp_strategy: c.tp_strategy !== '' ? c.tp_strategy           : null,
      };
    });
    const body = {
      trade_usdt:   parseFloat(cfg.trade_usdt)    || null,
      leverage:     parseInt(cfg.leverage)         || null,
      max_positions: parseInt(cfg.max_positions)   || null,
      type_configs,
    };
    try {
      const r = await fetch('/api/settings', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
      const d = await r.json();
      setMsg({ ok: d.ok, text: d.ok ? 'Zapisano ✓' : 'Błąd zapisu' });
    } catch(e) {
      setMsg({ ok: false, text: `Błąd: ${e}` });
    } finally {
      setSaving(false);
    }
  };

  const setBase = (k, v) => setCfg(p => ({ ...p, [k]: v }));
  const setType = (key, field, val) => setCfg(p => ({
    ...p,
    type_configs: { ...p.type_configs, [key]: { ...p.type_configs[key], [field]: val } }
  }));

  const sInp = { background:'var(--bg3)', border:'1px solid var(--border2)', borderRadius:4, color:'var(--text1)', fontFamily:'var(--mono)', fontSize:12, padding:'4px 8px', width:90, outline:'none' };
  const sLbl = { fontSize:11, color:'var(--text3)', marginBottom:3, display:'block' };
  const sCard = { background:'var(--bg2)', border:'1px solid var(--border)', borderRadius:8, padding:'20px 24px', marginBottom:16 };
  const sH = { fontSize:11, fontWeight:700, textTransform:'uppercase', letterSpacing:'.08em', color:'var(--text3)', marginBottom:16 };

  if (!cfg) return <div style={{padding:40, color:'var(--text3)', fontFamily:'var(--mono)', fontSize:12}}>Ładowanie…</div>;

  return (
    <div style={{maxWidth:780}}>
      <div style={{fontSize:18, fontWeight:700, color:'var(--text1)', marginBottom:24}}>Ustawienia</div>

      {/* Baza */}
      <div style={sCard}>
        <div style={sH}>Globalne parametry Bitget</div>
        <div style={{display:'flex', gap:32, flexWrap:'wrap'}}>
          <div>
            <label style={sLbl}>Kwota bazowa (USDT)</label>
            <input style={sInp} type="number" min="1" step="1" value={cfg.trade_usdt}
              onChange={e => setBase('trade_usdt', e.target.value)} />
          </div>
          <div>
            <label style={sLbl}>Dźwignia bazowa (x)</label>
            <input style={sInp} type="number" min="1" max="125" step="1" value={cfg.leverage}
              onChange={e => setBase('leverage', e.target.value)} />
          </div>
          <div>
            <label style={sLbl}>Max pozycji</label>
            <input style={sInp} type="number" min="1" max="20" step="1" value={cfg.max_positions}
              onChange={e => setBase('max_positions', e.target.value)} />
          </div>
        </div>
      </div>

      {/* Per-type */}
      <div style={sCard}>
        <div style={sH}>Konfiguracja per typ Algo2</div>
        <div style={{overflowX:'auto'}}>
          <table style={{width:'100%', borderCollapse:'collapse', fontSize:12, fontFamily:'var(--mono)'}}>
            <thead>
              <tr style={{borderBottom:'1px solid var(--border2)'}}>
                <th style={{textAlign:'left', padding:'6px 12px 6px 0', color:'var(--text3)', fontWeight:600, fontSize:10, textTransform:'uppercase'}}>Typ / Wariant</th>
                <th style={{textAlign:'center', padding:'6px 12px', color:'var(--text3)', fontWeight:600, fontSize:10, textTransform:'uppercase', width:80}}>Bitget</th>
                <th style={{textAlign:'center', padding:'6px 12px', color:'var(--text3)', fontWeight:600, fontSize:10, textTransform:'uppercase', width:130}}>Strategia TP</th>
                <th style={{textAlign:'center', padding:'6px 12px', color:'var(--text3)', fontWeight:600, fontSize:10, textTransform:'uppercase', width:110}}>Kwota (USDT)</th>
                <th style={{textAlign:'center', padding:'6px 12px', color:'var(--text3)', fontWeight:600, fontSize:10, textTransform:'uppercase', width:100}}>Dźwignia (x)</th>
              </tr>
            </thead>
            <tbody>
              {ALGO2_TYPES.map(t => {
                const c = cfg.type_configs[t.key];
                const isLong = t.key.includes('_long');
                return (
                  <tr key={t.key} style={{borderBottom:'1px solid var(--border)'}}>
                    <td style={{padding:'10px 12px 10px 0'}}>
                      <div style={{color:'var(--text1)', fontWeight:500}}>{t.label}</div>
                      <div style={{color:'var(--text3)', fontSize:10, marginTop:2}}>{t.variant}</div>
                    </td>
                    <td style={{textAlign:'center', padding:'10px 12px'}}>
                      <button
                        onClick={() => setType(t.key, 'enabled', !c.enabled)}
                        style={{
                          padding:'3px 12px', borderRadius:4, fontSize:11, fontWeight:600, cursor:'pointer',
                          border: c.enabled ? '1px solid var(--green)' : '1px solid var(--border2)',
                          background: c.enabled ? 'var(--green-dim)' : 'var(--bg3)',
                          color: c.enabled ? 'var(--green)' : 'var(--text3)',
                        }}
                      >{c.enabled ? 'ON' : 'OFF'}</button>
                    </td>
                    <td style={{textAlign:'center', padding:'10px 12px'}}>
                      <select
                        value={c.tp_strategy} disabled={!c.enabled}
                        onChange={e => setType(t.key, 'tp_strategy', e.target.value)}
                        style={{background:'var(--bg3)', border:'1px solid var(--border2)', borderRadius:4, color: c.enabled ? 'var(--text1)' : 'var(--text3)', fontFamily:'var(--mono)', fontSize:11, padding:'4px 6px', width:118, opacity: c.enabled ? 1 : 0.4, cursor: c.enabled ? 'pointer' : 'not-allowed'}}
                      >
                        <option value="">domyślna algo</option>
                        <option value="tp1_only">TP1 Only</option>
                        <option value="tp1_tp2">TP1 + TP2</option>
                      </select>
                    </td>
                    <td style={{textAlign:'center', padding:'10px 12px'}}>
                      <input
                        style={{...sInp, width:80, textAlign:'center', opacity: c.enabled ? 1 : 0.4}}
                        type="number" min="1" step="1" placeholder="domyślna"
                        value={c.trade_usdt} disabled={!c.enabled}
                        onChange={e => setType(t.key, 'trade_usdt', e.target.value)}
                      />
                    </td>
                    <td style={{textAlign:'center', padding:'10px 12px'}}>
                      <input
                        style={{...sInp, width:74, textAlign:'center', opacity: c.enabled ? 1 : 0.4}}
                        type="number" min="1" max="125" step="1" placeholder="domyślna"
                        value={c.leverage} disabled={!c.enabled}
                        onChange={e => setType(t.key, 'leverage', e.target.value)}
                      />
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <div style={{marginTop:10, fontSize:10, color:'var(--text3)'}}>Puste pola = wartość globalna</div>
        </div>
      </div>

      {/* Zapisz */}
      <div style={{display:'flex', alignItems:'center', gap:16}}>
        <button
          onClick={save} disabled={saving}
          style={{padding:'8px 28px', background:'var(--blue)', color:'#fff', border:'none', borderRadius:6, fontWeight:700, fontSize:13, cursor:saving?'not-allowed':'pointer', opacity:saving?0.6:1}}
        >{saving ? 'Zapisuję…' : 'Zapisz'}</button>
        {msg && <span style={{fontSize:12, fontFamily:'var(--mono)', color:msg.ok?'var(--green)':'var(--red)'}}>{msg.text}</span>}
      </div>
    </div>
  );
}

        </div>
        <div className="d-content">
          {tab==='dash' && <ViewDashboard/>}
          {tab==='setups' && <ViewSetups/>}
          {tab==='algo' && <ViewAlgo/>}
          {tab==='sim' && <ViewSimulator/>}
          {tab==='ml' && <ViewML/>}
          {tab==='settings' && <ViewSettings/>}
        </div>
      </div>
    </div>
  );
}

/* ── Mobile: TabSetups (unified — all statuses) ── */
function TabSetups() {
  const [statusFilters,setStatusFilters]=useState(DEFAULT_STATUSES);
  const [shadowFilter,setShadowFilter]=useState('all');
  const [settingsFilter,setSettingsFilter]=useState(null);
  const [rows,setRows]=useState(null);
  const [total,setTotal]=useState(0);
  const [regimeFilter,setRegimeFilter]=useState('all');
  const [filterTree,setFilterTree]=useState([]);
  const [selectedPairs,setSelectedPairs]=useState(null);
  const [showTypeFilter,setShowTypeFilter]=useState(false);
  const [dateFrom,setDateFrom]=useState(()=>{const d=new Date();d.setDate(d.getDate()-30);return d.toISOString().split('T')[0];});
  const [dateTo,setDateTo]=useState('');

  const toggleStatus=(s)=>setStatusFilters(prev=>prev.includes(s)?prev.filter(x=>x!==s):[...prev,s]);
  useEffect(()=>{
    fetch('/api/settings').then(r=>r.ok?r.json():{type_configs:{}}).then(d=>{
      const cfg=d.type_configs||{};
      const enabledKeys=Object.entries(cfg).filter(([,v])=>v.enabled===true).map(([k])=>k);
      if(enabledKeys.length===0){setSettingsFilter({types:[],variants:[]});return;}
      const types=[...new Set(enabledKeys.map(k=>k.split('__')[0]))];
      const variants=[...new Set(enabledKeys.map(k=>k.split('__')[1]))];
      setSettingsFilter({types,variants});
    }).catch(()=>setSettingsFilter({types:[],variants:[]}));
  },[]);
  useEffect(()=>{
    if(settingsFilter===null) return;
    fetch('/api/dashboard/variants-tree').then(r=>r.ok?r.json():[])
      .then(tree=>{
        setFilterTree(tree);
        setSelectedPairs(prev=>{
          if(prev!==null) return prev;
          if(settingsFilter.types.length>0)
            return tree.flatMap(m=>m.types.flatMap(t=>t.variants
              .filter(v=>settingsFilter.types.includes(t.name)&&settingsFilter.variants.includes(v.name))
              .map(v=>`${m.name}:${t.name}:${v.name}`)));
          return tree.flatMap(m=>m.types.flatMap(t=>t.variants.filter(v=>v.active).map(v=>`${m.name}:${t.name}:${v.name}`)));
        });
      }).catch(()=>{});
  },[settingsFilter]);
  const [modelFilters,typeFilters,variantFilters]=React.useMemo(()=>{
    if(filterTree.length>0&&selectedPairs!==null){
      if(selectedPairs.length===0) return [[],[],[]];
      const allPairs=filterTree.flatMap(m=>m.types.flatMap(t=>t.variants.map(v=>`${m.name}:${t.name}:${v.name}`)));
      if(selectedPairs.length===allPairs.length) return [[],[],[]];
      return [
        [...new Set(selectedPairs.map(p=>p.split(':')[0]))],
        [...new Set(selectedPairs.map(p=>p.split(':')[1]))],
        [...new Set(selectedPairs.map(p=>p.split(':')[2]))],
      ];
    }
    if(settingsFilter&&settingsFilter.types.length>0) return [[],settingsFilter.types,settingsFilter.variants];
    return [[],[],[]];
  },[selectedPairs,filterTree,settingsFilter]);
  const pairsFiltered=selectedPairs!==null&&filterTree.length>0&&
    selectedPairs.length<filterTree.flatMap(m=>m.types.flatMap(t=>t.variants)).length;
  const fetchRowsMobile=React.useCallback(()=>{
    if(settingsFilter===null) return;
    const p=new URLSearchParams({limit:100,shadow_filter:shadowFilter});
    if(statusFilters.length>0) p.set('statuses',statusFilters.join(','));
    if(modelFilters.length>0) p.set('models',modelFilters.join(','));
    if(typeFilters.length>0) p.set('types',typeFilters.join(','));
    if(variantFilters.length>0) p.set('variants',variantFilters.join(','));
    if(dateFrom) p.set('date_from',dateFrom);
    if(dateTo) p.set('date_to',dateTo);
    return fetch(`/api/dashboard/all-setups?${p}`)
      .then(r=>r.ok?r.json():{rows:[],total:0})
      .then(d=>{setRows(d.rows||[]);setTotal(d.total||0);}).catch(()=>{});
  },[statusFilters,shadowFilter,modelFilters,typeFilters,variantFilters,dateFrom,dateTo,settingsFilter]);
  useEffect(()=>{
    if(settingsFilter===null) return;
    setRows(null);
    fetchRowsMobile();
  },[fetchRowsMobile]);
  const resC=(r)=>r==='SL'?'var(--red)':r==='Anulowane'||r==='Nie weszło'||r==='Nieokreślone'?'var(--text3)':r?'var(--green)':'var(--text3)';
  const fmtU=(v)=>v==null?'—':`${v>0?'+':''}${Number(v).toFixed(1)}$`;
  const pC=(v)=>v==null?'var(--text3)':v>0?'var(--green)':v<0?'var(--red)':'var(--text3)';
  const SrcBadge=({tradeable,exch})=>{
    if(!tradeable) return <span style={{fontFamily:'var(--mono)',fontSize:9,padding:'1px 5px',borderRadius:3,background:'var(--bg3)',color:'var(--text3)',border:'1px solid var(--border2)'}}>SHADOW</span>;
    if(exch) return <span style={{fontFamily:'var(--mono)',fontSize:9,padding:'1px 5px',borderRadius:3,background:'var(--blue-dim)',color:'var(--blue)',border:'1px solid #4a9eff33'}}>BITGET</span>;
    return <span style={{fontFamily:'var(--mono)',fontSize:9,padding:'1px 5px',borderRadius:3,background:'var(--bg3)',color:'var(--text2)',border:'1px solid var(--border2)'}}>REAL</span>;
  };
  return (
    <div>
      <div className="sec-header"><span className="sec-title">Setups</span><span className="sec-badge">{rows?`${rows.length}/${total}`:'…'}</span></div>
      <div className="filter-scroll">
        {STATUS_OPTS.map(({v,l})=><div key={v} className={`filter-chip ${statusFilters.includes(v)?'active':''}`} onClick={()=>toggleStatus(v)}>{l}</div>)}
      </div>
      <div style={{padding:'4px 12px',display:'flex',flexDirection:'column',gap:5}}>
        <div style={{display:'flex',gap:4,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:9,color:'var(--text3)',minWidth:36,fontFamily:'var(--mono)'}}>Źródło:</span>
          {['all','real','bitget','shadow'].map(v=><div key={v} className={`filter-chip ${shadowFilter===v?'active':''}`} onClick={()=>setShadowFilter(v)} style={{fontFamily:'var(--mono)',fontSize:9}}>{v==='all'?'Wszystkie':v==='real'?'Real':v==='bitget'?'Bitget':'Shadow'}</div>)}
        </div>
        <div style={{display:'flex',gap:4,flexWrap:'wrap',alignItems:'center'}}>
          <span style={{fontSize:9,color:'var(--text3)',minWidth:36,fontFamily:'var(--mono)'}}>Trend:</span>
          {[{v:'all',l:'Wszystkie'},{v:'impulse',l:'Impulse'},{v:'trend',l:'Trend'},{v:'range',l:'Range'}].map(({v,l})=><div key={v} className={`filter-chip ${regimeFilter===v?'active':''}`} onClick={()=>setRegimeFilter(v)} style={{fontFamily:'var(--mono)',fontSize:9}}>{l}</div>)}
        </div>
        <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap'}}>
          <div className={`filter-chip ${showTypeFilter?'active':''}`} onClick={()=>setShowTypeFilter(p=>!p)} style={{fontFamily:'var(--mono)',fontSize:9}}>
            Typ/Wariant{pairsFiltered?' (filtr)':''} {showTypeFilter?'▴':'▾'}
          </div>
          {pairsFiltered&&<span style={{color:'var(--blue)',fontSize:10,cursor:'pointer',padding:'3px 4px'}} onClick={()=>setSelectedPairs(filterTree.flatMap(m=>m.types.flatMap(t=>t.variants.map(v=>`${m.name}:${t.name}:${v.name}`))))}>wyczysc</span>}
        </div>
        {showTypeFilter&&filterTree.length>0&&selectedPairs!==null&&
          <div style={{maxHeight:240,overflowY:'auto',borderTop:'1px solid var(--border)'}}>
            <FilterTree3 tree={filterTree} selected={selectedPairs} onSelect={setSelectedPairs} settingsFilter={settingsFilter}/>
          </div>}
        <div style={{display:'flex',gap:6,alignItems:'center'}}>
          <input type="date" value={dateFrom} onChange={e=>setDateFrom(e.target.value)} style={{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:3,padding:'4px 6px',color:'var(--text2)',fontFamily:'var(--mono)',fontSize:10,flex:1}}/>
          <span style={{color:'var(--text3)',fontSize:10}}>-</span>
          <input type="date" value={dateTo} onChange={e=>setDateTo(e.target.value)} style={{background:'var(--bg3)',border:'1px solid var(--border2)',borderRadius:3,padding:'4px 6px',color:'var(--text2)',fontFamily:'var(--mono)',fontSize:10,flex:1}}/>
          {(dateFrom||dateTo)&&<span style={{color:'var(--blue)',fontSize:11,cursor:'pointer'}} onClick={()=>{setDateFrom('');setDateTo('');}}>x</span>}
        </div>
      </div>
      {rows===null&&<div style={{padding:20,color:'var(--text3)',fontFamily:'var(--mono)',fontSize:11,textAlign:'center'}}>Ładowanie…</div>}
      {rows!==null&&rows.filter(r=>regimeFilter==='all'||((r.regime||'').toLowerCase().startsWith(regimeFilter))).map((r,i)=>{
        const MobileResultChip=()=>{
          const [editing,setEditing]=useState(false);
          const [saving,setSaving]=useState(false);
          const RES_OPTS=['TP1','TP2','TP1+BE','TP1+SL','TP1+TP2','SL','nieokreslone'];
          const saveR=async(nr)=>{
            setSaving(true);
            try{const resp=await fetch(`/api/update-result/${r.id}`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({result:nr})});if(resp.ok)await fetchRowsMobile();}catch(e){console.error('saveR error',e);}
            setSaving(false);
          };
          if(!r.result) return <span style={{fontSize:10,color:'var(--text3)',fontFamily:'var(--mono)'}}>{r.status}</span>;
          return <div style={{position:'relative'}}>
            <span style={{fontFamily:'var(--mono)',fontSize:11,color:resC(r.result),padding:'2px 7px',borderRadius:3,background:resC(r.result)==='var(--green)'?'var(--green-dim)':resC(r.result)==='var(--red)'?'var(--red-dim)':'var(--bg3)',cursor:'pointer'}} onClick={e=>{e.stopPropagation();setEditing(!editing);}}>{r.result}</span>
            {editing&&<div style={{position:'absolute',top:'100%',right:0,marginTop:2,background:'var(--bg1)',border:'1px solid var(--border2)',borderRadius:4,padding:4,display:'flex',flexDirection:'column',gap:2,minWidth:90,boxShadow:'0 4px 12px rgba(0,0,0,.4)',zIndex:20}} onClick={e=>e.stopPropagation()}>
              {RES_OPTS.map(opt=><button key={opt} disabled={saving} style={{background:opt===r.result?'var(--bg3)':'transparent',border:'none',color:resC(opt),fontFamily:'var(--mono)',fontSize:11,padding:'6px 10px',cursor:'pointer',borderRadius:3,textAlign:'left',whiteSpace:'nowrap'}} onClick={()=>saveR(opt)}>{opt}</button>)}
            </div>}
          </div>;
        };
        return <div key={i} className="hist-card">
          <div className="hist-card-row1">
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <span className={`kier-badge ${(r.kier||'long').toLowerCase()}`}>{r.kier}</span>
              <span style={{fontFamily:'var(--mono)',fontSize:12,color:'var(--text2)'}}>#{r.id}</span>
              <span style={{fontSize:10,color:'var(--text3)'}}>{r.t_def||'—'}</span>
            </div>
            <div style={{display:'flex',alignItems:'center',gap:6}}>
              <SrcBadge tradeable={r.tradeable} exch={r.exchange_position_opened}/>
              <MobileResultChip/>
            </div>
          </div>
          <div className="hist-typ" style={{marginBottom:4}}>{r.typ} · <span style={{color:'var(--text3)'}}>{r.variant}</span>{r.regime&&<span style={{marginLeft:6,fontFamily:'var(--mono)',fontSize:9,color:r.regime.includes('UP')?'var(--green)':r.regime.includes('DOWN')?'var(--red)':'var(--text3)'}}>{r.regime.replace('_',' ')}{r.regime_score!=null?`(${r.regime_score})`:''}</span>}</div>
          {r.rejection&&<div style={{fontFamily:'var(--mono)',fontSize:9,color:'var(--red)',marginBottom:4}}>ODRZUCONY: {r.rejection}</div>}
          <div style={{fontFamily:'var(--mono)',fontSize:10,color:'var(--text2)',marginBottom:4,display:'flex',flexWrap:'wrap',gap:'4px 10px'}}>
            <span>W1: <span style={{color:'var(--text1)'}}>{r.entries&&r.entries[0]!=null?`$${Number(r.entries[0]).toFixed(2)}`:'—'}</span></span>
            <span>TP1: <span style={{color:'var(--green)'}}>{r.tps&&r.tps[0]!=null?`$${Number(r.tps[0]).toFixed(2)}`:'—'}</span></span>
            {r.tps&&r.tps[1]!=null&&<span>TP2: <span style={{color:'var(--green)'}}>${Number(r.tps[1]).toFixed(2)}</span></span>}
            <span>SL: <span style={{color:'var(--red)'}}>{r.sl!=null?`$${Number(r.sl).toFixed(2)}`:'—'}</span></span>
          </div>
          <div className="hist-meta">
            <span className="hist-item">TP1: <span style={{color:pC(r.pnl_tp1)}}>{fmtU(r.pnl_tp1)}</span>{r.pnl_tp1_pct!=null&&<span style={{color:pC(r.pnl_tp1_pct),fontSize:9,marginLeft:2}}>({r.pnl_tp1_pct>0?'+':''}{Number(r.pnl_tp1_pct).toFixed(1)}%)</span>}</span>
            <span className="hist-item">TP1+TP2: <span style={{color:pC(r.pnl_tp12)}}>{fmtU(r.pnl_tp12)}</span>{r.pnl_pct!=null&&<span style={{color:pC(r.pnl_pct),fontSize:9,marginLeft:2}}>({r.pnl_pct>0?'+':''}{Number(r.pnl_pct).toFixed(1)}%)</span>}</span>
            <span className="hist-item" style={{marginLeft:'auto'}}>{r.t_entry?`WE: ${r.t_entry.slice(11,16)}`:'brak WE'}</span>
          </div>
        </div>;
      })}
    </div>
  );
}
/* ── Mobile: TabAlgo ── */
function TabAlgo() {
  const [period,setPeriod]=useState('30d');
  const [subTab,setSubTab]=useState('wariant');
  const [rows,setRows]=useState(null);
  const [filterTree,setFilterTree]=useState([]);
  const [selectedPairs,setSelectedPairs]=useState(null);
  const [settingsFilter,setSettingsFilter]=useState(null);
  const [showTypeFilter,setShowTypeFilter]=useState(false);
  useEffect(()=>{
    fetch('/api/settings').then(r=>r.ok?r.json():{type_configs:{}}).then(d=>{
      const cfg=d.type_configs||{};
      const enabledKeys=Object.entries(cfg).filter(([,v])=>v.enabled===true).map(([k])=>k);
      if(enabledKeys.length===0){setSettingsFilter({pairs:[]});return;}
      const pairs=enabledKeys.map(k=>{const[t,v]=k.split('__');return`${t}:${v||'baseline'}`;});
      setSettingsFilter({pairs});
    }).catch(()=>setSettingsFilter({pairs:[]}));
  },[]);
  useEffect(()=>{
    fetch('/api/algo2/variants-list').then(r=>r.ok?r.json():[])
      .then(tree=>{
        setFilterTree(tree);
        setSelectedPairs(prev=>{
          if(prev!==null) return prev;
          if(settingsFilter&&settingsFilter.pairs.length>0){
            const treeSet=new Set(tree.flatMap(n=>n.variants.map(v=>`${n.name}:${v.name}`)));
            return settingsFilter.pairs.filter(p=>treeSet.has(p));
          }
          return tree.flatMap(n=>n.variants.filter(v=>v.active).map(v=>`${n.name}:${v.name}`));
        });
      }).catch(()=>{});
  },[settingsFilter]);
  useEffect(()=>{
    if(settingsFilter===null||filterTree.length===0||selectedPairs!==null) return;
    const treeSet=new Set(filterTree.flatMap(n=>n.variants.map(v=>`${n.name}:${v.name}`)));
    if(settingsFilter.pairs.length>0)
      setSelectedPairs(settingsFilter.pairs.filter(p=>treeSet.has(p)));
    else
      setSelectedPairs(filterTree.flatMap(n=>n.variants.filter(v=>v.active).map(v=>`${n.name}:${v.name}`)));
  },[settingsFilter,filterTree,selectedPairs]);
  const allTreePairs=React.useMemo(()=>filterTree.flatMap(n=>n.variants.map(v=>`${n.name}:${v.name}`)),[filterTree]);
  const pairsFiltered=selectedPairs!==null&&allTreePairs.length>0&&selectedPairs.length<allTreePairs.length;
  useEffect(()=>{
    if(selectedPairs===null) return;
    setRows(null);
    const p=new URLSearchParams({period,view:subTab});
    if(selectedPairs.length>0&&selectedPairs.length<allTreePairs.length) p.set('pairs',selectedPairs.join(','));
    fetch(`/api/dashboard/algo?${p}`)
      .then(r=>r.ok?r.json():[]).then(setRows).catch(()=>setRows([]));
  },[period,subTab,selectedPairs,allTreePairs.length]);
  const pC=(v)=>v==null?'var(--text3)':String(v).startsWith('+')?'var(--green)':String(v).startsWith('-')?'var(--red)':'var(--text3)';
  const wC=(w)=>w==='100%'?'var(--green)':w==='0%'?'var(--red)':'var(--text3)';
  const fmtP=(v)=>v==null?'—':`${v>0?'+':''}${v}%`;
  const groups=React.useMemo(()=>{
    if(!rows||subTab!=='wariant') return null;
    const g={};
    rows.forEach(r=>{const sc=r.scenario||'?';if(!g[sc])g[sc]=[];g[sc].push(r);});
    return g;
  },[rows,subTab]);
  const periodSummary=React.useMemo(()=>{
    if(!rows||subTab!=='per data') return null;
    let n=0,w=0,l=0,tp1Sum=0,tp12Sum=0,tp1Cnt=0,tp12Cnt=0;
    rows.forEach(r=>{
      n+=r.n||0; w+=r.w||0; l+=r.l||0;
      const t1=parseFloat(String(r.avg_pct_tp1).replace(/[^0-9.\-]/g,''));
      const t12=parseFloat(String(r.avg_pct_tp12).replace(/[^0-9.\-]/g,''));
      if(!isNaN(t1)){tp1Sum+=t1;tp1Cnt++;}
      if(!isNaN(t12)){tp12Sum+=t12;tp12Cnt++;}
    });
    const wr=w+l>0?`${(w/(w+l)*100).toFixed(1)}%`:'—';
    const fmtAvg=(sum,cnt)=>cnt>0?`${(sum/cnt)>=0?'+':''}${(sum/cnt).toFixed(1)}%`:'—';
    return {n,w,l,wr,avg_pct_tp1:fmtAvg(tp1Sum,tp1Cnt),avg_pct_tp12:fmtAvg(tp12Sum,tp12Cnt)};
  },[rows,subTab]);
  return (
    <div>
      <div className="sec-header" style={{paddingBottom:10}}><span className="sec-title">Analityka Algo</span></div>
      <div className="m-seg-tabs">{['7d','30d','3m','6m','12m'].map(p=><div key={p} className={`m-seg-tab ${period===p?'active':''}`} onClick={()=>setPeriod(p)}>{p}</div>)}</div>
      <div className="filter-scroll">
        {['wariant','per data','per model'].map(t=><div key={t} className={`filter-chip ${subTab===t?'active':''}`} onClick={()=>setSubTab(t)}>{t}</div>)}
        {filterTree.length>0&&selectedPairs!==null&&<div className={`filter-chip ${showTypeFilter?'active':''}`} style={{fontFamily:'var(--mono)',fontSize:9}} onClick={()=>setShowTypeFilter(p=>!p)}>
          Filtr{pairsFiltered?' *':''} {showTypeFilter?'▴':'▾'}
        </div>}
      </div>
      {showTypeFilter&&filterTree.length>0&&selectedPairs!==null&&<div style={{padding:'10px 16px',borderBottom:'1px solid var(--border)'}}>
        <div style={{display:'flex',gap:6,marginBottom:8,flexWrap:'wrap'}}>
          {settingsFilter&&settingsFilter.pairs.length>0&&<span className="filter-chip" style={{fontSize:10}} onClick={()=>{const s=new Set(settingsFilter.pairs);setSelectedPairs(allTreePairs.filter(p=>s.has(p)));}}>tylko włączone</span>}
          <span className="filter-chip" style={{fontSize:10,opacity:.6}} onClick={()=>setSelectedPairs(allTreePairs)}>wszystkie</span>
          <span className="filter-chip" style={{fontSize:10,opacity:.35}} onClick={()=>setSelectedPairs([])}>✕ wyczyść</span>
        </div>
        <FilterTree tree={filterTree} selected={selectedPairs} onSelect={setSelectedPairs}/>
      </div>}
      {rows===null && <div style={{padding:20,color:'var(--text3)',fontFamily:'var(--mono)',fontSize:11,textAlign:'center'}}>Ładowanie…</div>}
      {rows!==null && subTab==='wariant' && Object.entries(groups||{}).map(([sc,variants])=>(
        <div key={sc} className="section-wrap">
          <div style={{padding:'6px 16px',background:'var(--bg2)',fontSize:10,fontWeight:700,color:'var(--text2)',textTransform:'uppercase',letterSpacing:'.08em'}}>{sc}</div>
          <div style={{display:'flex',padding:'6px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
            <div style={{flex:1,fontSize:9,color:'var(--text3)',fontWeight:600,textTransform:'uppercase'}}>Wariant</div>
            <div style={{width:50,fontSize:9,color:'var(--text3)',fontWeight:600,textAlign:'right',textTransform:'uppercase'}}>%/poz</div>
            <div style={{width:56,fontSize:9,color:'var(--text3)',fontWeight:600,textAlign:'right',textTransform:'uppercase'}}>Suma%</div>
            <div style={{width:50,fontSize:9,color:'var(--text3)',fontWeight:600,textAlign:'right',textTransform:'uppercase'}}>%/dzień</div>
          </div>
          {variants.map((r,i)=>{const nC=(v)=>v==null?'var(--text3)':v>0?'var(--green)':v<0?'var(--red)':'var(--text3)';return(
            <div key={i} className="algo-row" style={{flexDirection:'column',gap:2}}>
              <div style={{display:'flex',alignItems:'center'}}>
                <div style={{flex:1}}><div className="algo-name" style={{fontSize:11}}>{r.variant}</div><div className="algo-sub">Entry: {r.entry_rate} · SL: {r.sl_rate}</div></div>
                <div style={{width:50,textAlign:'right',fontFamily:'var(--mono)',fontSize:11,color:nC(r.avg_pct_tp12)}}>{fmtP(r.avg_pct_tp12)}</div>
                <div style={{width:56,textAlign:'right',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:nC(r.sum_pct_tp12)}}>{fmtP(r.sum_pct_tp12)}</div>
                <div style={{width:50,textAlign:'right',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:nC(r.daily_pct_tp12)}}>{fmtP(r.daily_pct_tp12)}</div>
              </div>
            </div>
          );})}
        </div>
      ))}
      {rows!==null && subTab==='per data' && <>
        <div className="section-wrap">
          <div style={{display:'flex',padding:'8px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
            <div style={{width:52,fontSize:9,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em'}}>Data</div>
            <div style={{width:24,fontSize:9,color:'var(--text3)',fontWeight:600,textAlign:'center',textTransform:'uppercase'}}>N</div>
            <div style={{width:24,fontSize:9,color:'var(--text3)',fontWeight:600,textAlign:'center',textTransform:'uppercase'}}>W</div>
            <div style={{width:24,fontSize:9,color:'var(--text3)',fontWeight:600,textAlign:'center',textTransform:'uppercase'}}>L</div>
            <div style={{flex:1,fontSize:9,color:'var(--text3)',fontWeight:600,textAlign:'center',textTransform:'uppercase'}}>WR</div>
            <div style={{width:48,fontSize:9,color:'var(--text3)',fontWeight:600,textAlign:'right',textTransform:'uppercase'}}>TP1</div>
            <div style={{width:48,fontSize:9,color:'var(--text3)',fontWeight:600,textAlign:'right',textTransform:'uppercase'}}>TP1+2</div>
          </div>
          {rows.map((r,i)=>(
            <div key={i} className="data-row">
              <div className="data-date" style={{minWidth:52}}>{String(r.date).slice(5)}</div>
              <div style={{width:24,textAlign:'center',color:'var(--text2)',fontSize:11}}>{r.n}</div>
              <div style={{width:24,textAlign:'center',color:'var(--green)',fontSize:11}}>{r.w}</div>
              <div style={{width:24,textAlign:'center',color:'var(--red)',fontSize:11}}>{r.l}</div>
              <div style={{flex:1,textAlign:'center',color:wC(r.wr),fontSize:11}}>{r.wr}</div>
              <div style={{width:48,textAlign:'right',fontFamily:'var(--mono)',fontSize:11,color:pC(r.avg_pct_tp1)}}>{r.avg_pct_tp1}</div>
              <div style={{width:48,textAlign:'right',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:pC(r.avg_pct_tp12)}}>{r.avg_pct_tp12}</div>
            </div>
          ))}
          {periodSummary && <div style={{display:'flex',padding:'8px 16px',borderTop:'2px solid var(--border)',background:'var(--bg3)'}}>
            <div style={{width:52,fontFamily:'var(--mono)',fontSize:10,fontWeight:700,color:'var(--text2)',letterSpacing:'.04em'}}>Ø OKRES</div>
            <div style={{width:24,textAlign:'center',fontFamily:'var(--mono)',fontSize:11,fontWeight:700}}>{periodSummary.n}</div>
            <div style={{width:24,textAlign:'center',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:'var(--green)'}}>{periodSummary.w}</div>
            <div style={{width:24,textAlign:'center',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:'var(--red)'}}>{periodSummary.l}</div>
            <div style={{flex:1,textAlign:'center',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:wC(periodSummary.wr)}}>{periodSummary.wr}</div>
            <div style={{width:48,textAlign:'right',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:pC(periodSummary.avg_pct_tp1)}}>{periodSummary.avg_pct_tp1}</div>
            <div style={{width:48,textAlign:'right',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:pC(periodSummary.avg_pct_tp12)}}>{periodSummary.avg_pct_tp12}</div>
          </div>}
        </div>
      </>}
      {rows!==null && subTab==='per model' && <div className="section-wrap">
        <div style={{display:'flex',padding:'8px 16px',borderBottom:'1px solid var(--border)',background:'var(--bg2)'}}>
          <div style={{flex:1,fontSize:10,color:'var(--text3)',fontWeight:600,textTransform:'uppercase',letterSpacing:'.06em'}}>Model</div>
          <div style={{width:50,fontSize:10,color:'var(--text3)',fontWeight:600,textAlign:'right',textTransform:'uppercase'}}>Avg%</div>
          <div style={{width:56,fontSize:10,color:'var(--text3)',fontWeight:600,textAlign:'right',textTransform:'uppercase'}}>Suma%</div>
          <div style={{width:50,fontSize:10,color:'var(--text3)',fontWeight:600,textAlign:'right',textTransform:'uppercase'}}>%/dzień</div>
        </div>
        {rows.map((r,i)=>(
          <div key={i} className="algo-row">
            <div style={{flex:1}}><div className="algo-name">{r.name}</div></div>
            <div style={{width:50,textAlign:'right',fontFamily:'var(--mono)',fontSize:11,color:pC(r.avg_pct_tp12)}}>{r.avg_pct_tp12}</div>
            <div style={{width:56,textAlign:'right',fontFamily:'var(--mono)',fontSize:11,fontWeight:700,color:pC(r.sum_pct_tp12)}}>{fmtP(r.sum_pct_tp12)}</div>
            <div style={{width:50,textAlign:'right',fontFamily:'var(--mono)',fontSize:11,fontWeight:600,color:pC(r.daily_pct_tp12)}}>{fmtP(r.daily_pct_tp12)}</div>
          </div>
        ))}
      </div>}
    </div>
  );
}
/* ── Mobile: TabHistoria (legacy — kept for compat) ── */
function TabHistoria() {
  return <TabSetups/>;
}
/* ── MobileApp ── */
function MobileApp() {
  const [tab,setTab]=useState(0);
  const {price, stats, market, setups, statsPeriod, setStatsPeriod} = useDash();
  const p = price || {}, s = stats || {}, m = market || {};
  const tabs=['dash','setups','algo','sim','ml','settings'];
  const labels=['Dashboard','Setups','Algo','Sym','ML','Settings'];
  return (
    <div className="m-root">
      <div className="phone-wrap">
        <div className="m-topbar">
          <div className="topbar-row1">
            <span className="topbar-brand">AlertSol</span>
            <span className="topbar-date">{nowPl()}</span>
          </div>
          <div className="topbar-row2">
            <div style={{display:'flex',alignItems:'flex-end',gap:0}}>
              <span className="topbar-price">{fmtPrice(p.price)}</span>
              {p.change_pct!=null && <span className="topbar-change" style={{color:p.change_pct>=0?'var(--green)':'var(--red)'}}>{p.change_pct>=0?'+':''}{Number(p.change_pct).toFixed(2)}%</span>}
            </div>
            <div className="topbar-meta">
              {p.regime && <span className={`m-regime ${regDir(p.regime_direction)}`}>{regLabel(p.regime,p.regime_direction)}</span>}
              <span className="topbar-pair">{p.pair||'SOL/USDT SPOT'}</span>
            </div>
          </div>
          <div style={{display:'flex',gap:10,marginTop:6,fontFamily:'var(--mono)',fontSize:10,flexWrap:'wrap'}}>
            {m.score!=null && <span style={{color:'var(--text3)'}}>Score: <span style={{color:'var(--text2)'}}>{Number(m.score).toFixed(1)}</span></span>}
            {m.vol_ratio!=null && <span style={{color:'var(--text3)'}}>Vol: <span style={{color:'var(--text2)'}}>{Number(m.vol_ratio).toFixed(2)}x</span></span>}
            {m.atr!=null && <span style={{color:'var(--text3)'}}>ATR: <span style={{color:'var(--text2)'}}>{Number(m.atr).toFixed(2)}</span></span>}
            {m.last_scans&&m.last_scans['Algo2'] && <span style={{color:'var(--text3)'}}>Algo2: <span style={{color:'var(--text2)'}}>{m.last_scans['Algo2'].count} stp</span></span>}
            {m.regime_alt && <span style={{color:'var(--amber)'}} title="RANGE, ale krótsze ramy czasowe (4h/8h/12h) zgodnie wskazują trend — obserwacyjne, nie wpływa na handel">Alt: {m.regime_alt.replace('_',' ')}</span>}
          </div>
        </div>
        <div className="stats-strip" style={{flexDirection:'column',padding:0}}>
          <div style={{display:'flex'}}>
            <div className="m-stat-cell"><div className={`m-stat-val ${(s.pnl||0)>=0?'green':'red'}`}>{fmtPnl(s.pnl)}</div><div className="m-stat-lbl">P&L</div></div>
            <div className="m-stat-cell"><div className="m-stat-val dim">{s.entry_rate!=null?`${Number(s.entry_rate).toFixed(0)}%`:'—'}</div><div className="m-stat-lbl">Entry Rate</div></div>
            <div className="m-stat-cell"><div className="m-stat-val dim">{fmtWr(s.win_rate)}</div><div className="m-stat-lbl">Win Rate</div></div>
            <div className="m-stat-cell"><div className="m-stat-val amber">{s.active_count??'—'}</div><div className="m-stat-lbl">Aktywne</div></div>
          </div>
          <div style={{display:'flex',gap:4,padding:'6px 10px',borderTop:'1px solid var(--border)'}}>
            {[{v:'today',l:'dziś'},{v:'24h',l:'24h'},{v:'7d',l:'7d'},{v:'30d',l:'30d'}].map(({v,l})=>(
              <button key={v} onClick={()=>setStatsPeriod(v)} style={{flex:1,padding:'3px 4px',fontSize:10,fontFamily:'var(--mono)',fontWeight:600,borderRadius:3,border:`1px solid ${statsPeriod===v?'var(--blue)':'var(--border2)'}`,background:statsPeriod===v?'var(--blue-dim)':'transparent',color:statsPeriod===v?'var(--blue)':'var(--text3)',cursor:'pointer'}}>{l}</button>
            ))}
          </div>
        </div>
        <div className="scroll-area">
          {tab===0 && <TabDashboard/>}
          {tab===1 && <TabSetups/>}
          {tab===2 && <TabAlgo/>}
          {tab===3 && <ViewSimulator/>}
          {tab===4 && <ViewML/>}
          {tab===5 && <ViewSettings/>}
        </div>
        <div className="bottom-nav">
          {tabs.map((t,i)=>(
            <div key={i} className={`m-nav-item ${tab===i?'active':''}`} onClick={()=>setTab(i)}>
              <div className="nav-icon-wrap">
                {NAV_ICONS[t](tab===i)}
                {t==='setups' && tab!==1 && <div className="nav-dot"/>}
              </div>
              <span className="m-nav-label">{labels[i]}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
/* ── Root App ── */
function App() {
  const [isMobile,setIsMobile]=useState(window.innerWidth < 768);
  const [price,setPrice]=useState(null);
  const [stats,setStats]=useState(null);
  const [market,setMarket]=useState(null);
  const [setups,setSetups]=useState(SETUPS.map(normalizeSetup));
  const [alert,setAlert]=useState(null);
  const [statsPeriod,setStatsPeriod]=useState('30d');
  const [budget,setBudget]=useState(null);

  useEffect(()=>{
    const onR=()=>setIsMobile(window.innerWidth < 768);
    window.addEventListener('resize',onR);
    return ()=>window.removeEventListener('resize',onR);
  },[]);

  useEffect(()=>{
    const f=()=>fetch('/api/dashboard/price').then(r=>r.ok?r.json():null).then(d=>{if(d)setPrice(d);}).catch(()=>{});
    f(); const id=setInterval(f,30000); return ()=>clearInterval(id);
  },[]);

  useEffect(()=>{
    const f=()=>fetch(`/api/dashboard/stats?period=${statsPeriod}`).then(r=>r.ok?r.json():null).then(d=>{if(d)setStats(d);}).catch(()=>{});
    f(); const id=setInterval(f,60000); return ()=>clearInterval(id);
  },[statsPeriod]);

  useEffect(()=>{
    const f=()=>fetch('/api/market-status').then(r=>r.ok?r.json():null).then(d=>{if(d)setMarket(d);}).catch(()=>{});
    f(); const id=setInterval(f,30000); return ()=>clearInterval(id);
  },[]);

  const refreshSetups=React.useCallback(()=>{
    fetch('/api/dashboard/setups').then(r=>{if(!r.ok)throw new Error(r.status);return r.json();}).then(d=>setSetups(d.map(normalizeSetup))).catch(()=>{});
  },[]);

  useEffect(()=>{
    refreshSetups();
    const id=setInterval(refreshSetups,30000); return ()=>clearInterval(id);
  },[]);

  useEffect(()=>{
    const f=()=>fetch('/api/dashboard/alert').then(r=>r.ok?r.json():null).then(d=>{if(d)setAlert(d);}).catch(()=>{});
    f(); const id=setInterval(f,30000); return ()=>clearInterval(id);
  },[]);

  useEffect(()=>{
    const f=()=>fetch('/api/budget-info').then(r=>r.ok?r.json():null).then(d=>{if(d)setBudget(d);}).catch(()=>{});
    f(); const id=setInterval(f,30000); return ()=>clearInterval(id);
  },[]);

  return (
    <DashCtx.Provider value={{price,stats,market,setups,alert,statsPeriod,setStatsPeriod,refreshSetups,budget}}>
      {isMobile ? <MobileApp/> : <DesktopApp/>}
    </DashCtx.Provider>
  );
}
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
