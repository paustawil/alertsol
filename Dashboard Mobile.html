<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AlertSol Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
:root {
  --bg0: #0a0e14;
  --bg1: #0f1520;
  --bg2: #151d2e;
  --bg3: #1c2538;
  --border: #1e2d45;
  --border2: #253348;
  --text1: #e8edf5;
  --text2: #8a9bbf;
  --text3: #6b7fa3;
  --green: #00d68f;
  --green-dim: #00d68f22;
  --red: #ff4d6a;
  --red-dim: #ff4d6a22;
  --amber: #f5a623;
  --amber-dim: #f5a62322;
  --blue: #4a9eff;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

body {
  background: var(--bg0);
  font-family: var(--sans);
  color: var(--text1);
  min-height: 100dvh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
}

/* Phone wrapper — on desktop centers a 390px phone */
.phone-wrap {
  width: 100%;
  max-width: 390px;
  min-height: 100dvh;
  background: var(--bg0);
  display: flex;
  flex-direction: column;
  position: relative;
  overflow: hidden;
}

/* ─── Top bar ─────────────────────────────────── */
.topbar {
  background: var(--bg1);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px 12px;
  flex-shrink: 0;
}
.topbar-row1 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 10px;
}
.topbar-brand {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  color: var(--text2);
  text-transform: uppercase;
}
.topbar-date {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--text2);
}
.topbar-row2 {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
}
.topbar-price {
  font-family: var(--mono);
  font-size: 32px;
  font-weight: 600;
  color: var(--text1);
  line-height: 1;
}
.topbar-change {
  font-family: var(--mono);
  font-size: 13px;
  color: var(--red);
  margin-left: 8px;
}
.topbar-meta {
  display: flex;
  flex-direction: column;
  align-items: flex-end;
  gap: 4px;
}
.regime-badge {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 3px 9px;
  border-radius: 3px;
  text-transform: uppercase;
}
.regime-badge.down { background: var(--red-dim); color: var(--red); border: 1px solid #ff4d6a44; }
.regime-badge.up { background: var(--green-dim); color: var(--green); border: 1px solid #00d68f44; }
.topbar-pair { font-size: 11px; color: var(--text3); font-family: var(--mono); }

/* ─── Stats strip ─────────────────────────────── */
.stats-strip {
  display: flex;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.stat-cell {
  flex: 1;
  padding: 10px 8px;
  text-align: center;
  border-right: 1px solid var(--border);
}
.stat-cell:last-child { border-right: none; }
.stat-val {
  font-family: var(--mono);
  font-size: 14px;
  font-weight: 600;
  line-height: 1;
  margin-bottom: 3px;
}
.stat-lbl {
  font-size: 9px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.green { color: var(--green); }
.red { color: var(--red); }
.amber { color: var(--amber); }
.blue { color: var(--blue); }
.dim { color: var(--text2); }

/* ─── Scroll area ─────────────────────────────── */
.scroll-area {
  flex: 1;
  overflow-y: auto;
  overflow-x: hidden;
  -webkit-overflow-scrolling: touch;
  padding-bottom: 16px;
}
.scroll-area::-webkit-scrollbar { display: none; }

/* ─── Section header ─────────────────────────── */
.sec-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 16px 8px;
  border-bottom: 1px solid var(--border);
}
.sec-title {
  font-size: 12px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text2);
}
.sec-badge {
  font-family: var(--mono);
  font-size: 11px;
  background: var(--bg3);
  color: var(--text2);
  padding: 2px 8px;
  border-radius: 10px;
  border: 1px solid var(--border2);
}

/* ─── Alert banner ───────────────────────────── */
.alert-banner {
  margin: 0 0 12px;
  background: var(--amber-dim);
  border: 1px solid #f5a62344;
  border-left: none;
  border-right: none;
  border-radius: 0;
  padding: 9px 12px;
  font-size: 11px;
  color: var(--amber);
  font-family: var(--mono);
  line-height: 1.5;
}

/* ─── Chart placeholder ──────────────────────── */
.chart-wrap {
  margin: 0 0 4px;
  border-radius: 0;
  border-left: none; border-right: none;
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 6px;
  height: 150px;
  position: relative;
  overflow: hidden;
}
.chart-label {
  position: absolute;
  top: 8px; left: 10px;
  font-size: 10px;
  color: var(--text3);
  font-family: var(--mono);
  z-index: 2;
}
.chart-svg { width: 100%; height: 100%; }

/* ─── Setup card ─────────────────────────────── */
.setup-card {
  margin: 0 0 1px;
  border-radius: 0;
  border-left: none; border-right: none;
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.setup-card-top {
  padding: 10px 12px 8px;
  border-bottom: 1px solid var(--border);
}
.setup-card-row1 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 4px;
}
.setup-id {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text1);
}
.kier-badge {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.08em;
  padding: 2px 8px;
  border-radius: 3px;
}
.kier-badge.long { background: var(--green-dim); color: var(--green); border: 1px solid #00d68f33; }
.kier-badge.short { background: var(--red-dim); color: var(--red); border: 1px solid #ff4d6a33; }
.status-dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  display: inline-block;
  margin-right: 5px;
}
.setup-typ {
  font-size: 11px;
  color: var(--text2);
}
.setup-card-bottom {
  display: flex;
  padding: 8px 12px;
  gap: 0;
}
.setup-stat {
  flex: 1;
  border-right: 1px solid var(--border);
  padding-right: 10px;
  margin-right: 10px;
}
.setup-stat:last-child { border-right: none; padding-right: 0; margin-right: 0; }
.setup-stat-val {
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--text1);
}
.setup-stat-lbl {
  font-size: 9px;
  color: var(--text3);
  text-transform: uppercase;
  margin-top: 1px;
}

/* ─── Action button ──────────────────────────── */
.action-btn {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 10px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 3px;
  border: none;
  cursor: pointer;
  font-family: var(--mono);
  letter-spacing: 0.04em;
}
.action-btn.red { background: var(--red-dim); color: var(--red); border: 1px solid #ff4d6a33; }
.action-btn.green { background: var(--green-dim); color: var(--green); border: 1px solid #00d68f33; }
.action-btn.gray { background: var(--bg3); color: var(--text2); border: 1px solid var(--border2); }

/* ─── Segment tabs ───────────────────────────── */
.seg-tabs {
  display: flex;
  margin: 0 0 12px;
  border-radius: 0;
  border-left: none; border-right: none;
  background: var(--bg2);
  border-radius: 6px;
  padding: 3px;
  border: 1px solid var(--border);
}
.seg-tab {
  flex: 1;
  text-align: center;
  padding: 6px 4px;
  font-size: 11px;
  font-weight: 600;
  color: var(--text3);
  cursor: pointer;
  border-radius: 4px;
  font-family: var(--mono);
  transition: all 0.15s;
}
.seg-tab.active {
  background: var(--bg3);
  color: var(--text1);
  border: 1px solid var(--border2);
}

/* ─── Algo table ─────────────────────────────── */
.algo-row {
  display: flex;
  align-items: center;
  padding: 10px 16px;
  border-bottom: 1px solid var(--border);
}
.algo-row:last-child { border-bottom: none; }
.algo-name { flex: 1; font-size: 12px; font-weight: 600; color: var(--text1); }
.algo-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); margin-top: 2px; }
.algo-pnl { font-family: var(--mono); font-size: 14px; font-weight: 600; text-align: right; min-width: 60px; }
.algo-wr { font-family: var(--mono); font-size: 11px; text-align: center; min-width: 44px; color: var(--text2); }

/* ─── Per data table ─────────────────────────── */
.data-row {
  display: flex;
  align-items: center;
  padding: 9px 16px;
  border-bottom: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 12px;
}
.data-row:last-child { border-bottom: none; }
.data-date { color: var(--text2); min-width: 80px; }
.data-chips { display: flex; gap: 6px; flex: 1; }
.data-chip { font-size: 10px; color: var(--text3); }
.data-pnl { font-weight: 600; text-align: right; min-width: 56px; }

/* ─── History card ───────────────────────────── */
.hist-card {
  margin: 0 0 1px;
  border-radius: 0;
  border-left: none; border-right: none;
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 12px;
}
.hist-card-row1 {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 6px;
}
.hist-typ { font-size: 11px; color: var(--text2); }
.hist-pnl { font-family: var(--mono); font-size: 15px; font-weight: 600; }
.hist-meta { display: flex; gap: 12px; }
.hist-item { font-family: var(--mono); font-size: 11px; color: var(--text3); }
.hist-item span { color: var(--text2); }

/* ─── Filter chips ───────────────────────────── */
.filter-scroll {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 0 16px 10px;
  /* keep side padding for scroll chips */
  -webkit-overflow-scrolling: touch;
}
.filter-scroll::-webkit-scrollbar { display: none; }
.filter-chip {
  white-space: nowrap;
  padding: 4px 11px;
  border-radius: 12px;
  font-size: 11px;
  font-weight: 500;
  border: 1px solid var(--border2);
  color: var(--text2);
  background: var(--bg2);
  cursor: pointer;
  transition: all 0.15s;
  font-family: var(--mono);
}
.filter-chip.active { background: var(--bg3); color: var(--text1); border-color: var(--blue); }

/* ─── Bottom nav ─────────────────────────────── */
.bottom-nav {
  display: flex;
  background: var(--bg1);
  border-top: 1px solid var(--border);
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  flex-shrink: 0;
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  padding: 4px 0;
  transition: all 0.15s;
}
.nav-icon {
  width: 22px; height: 22px;
  opacity: 0.35;
  transition: opacity 0.15s;
}
.nav-label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.06em;
  text-transform: uppercase;
  color: var(--text3);
  transition: color 0.15s;
}
.nav-item.active .nav-icon { opacity: 1; }
.nav-item.active .nav-label { color: var(--blue); }
.nav-dot {
  position: absolute;
  top: -2px; right: -2px;
  width: 7px; height: 7px;
  background: var(--amber);
  border-radius: 50%;
  border: 1.5px solid var(--bg1);
}
.nav-icon-wrap { position: relative; }

/* ─── Divider ─────────────────────────────────── */
.divider { height: 1px; background: var(--border); margin: 0; }

/* ─── Empty / placeholder ─────────────────────── */
.empty-hint {
  text-align: center;
  padding: 40px 20px;
  color: var(--text3);
  font-size: 13px;
}

/* ─── Section wrap (card bg) ──────────────────── */
.section-wrap {
  margin: 0 0 16px;
  border-radius: 0;
  border-left: none; border-right: none;
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">


const { useState, useMemo } = React;

// ── Mini candlestick SVG chart ──────────────────────────────
function MiniChart() {
  const data = [
  { o: 87, c: 85.5, h: 88, l: 85 }, { o: 85.5, c: 86.2, h: 86.8, l: 85 }, { o: 86.2, c: 85, h: 86.5, l: 84.5 },
  { o: 85, c: 83.8, h: 85.2, l: 83.5 }, { o: 83.8, c: 84.5, h: 84.8, l: 83.2 }, { o: 84.5, c: 83, h: 84.8, l: 82.8 },
  { o: 83, c: 84.8, h: 85, l: 82.8 }, { o: 84.8, c: 84, h: 85.2, l: 83.5 }, { o: 84, c: 82, h: 84.2, l: 81.5 },
  { o: 82, c: 83, h: 83.5, l: 81.5 }, { o: 83, c: 81.5, h: 83.2, l: 81 }, { o: 81.5, c: 82.3, h: 82.5, l: 81 },
  { o: 82.3, c: 81, h: 82.5, l: 80.5 }, { o: 81, c: 82, h: 82.3, l: 80.8 }, { o: 82, c: 84.98, h: 85.2, l: 81.8 }];

  const W = 358,H = 130;
  const minP = Math.min(...data.map((d) => d.l)) - 0.5;
  const maxP = Math.max(...data.map((d) => d.h)) + 0.5;
  const py = (v) => H - (v - minP) / (maxP - minP) * (H - 16) - 8;
  const bw = W / data.length - 2;

  return (
    <div className="chart-wrap">
      <div className="chart-label">SOL/USDT · 1h</div>
      <svg className="chart-svg" viewBox={`0 0 ${W} ${H}`} preserveAspectRatio="none">
        {/* Grid lines */}
        {[0.25, 0.5, 0.75].map((f, i) =>
        <line key={i} x1="0" y1={8 + f * (H - 16)} x2={W} y2={8 + f * (H - 16)}
        stroke="#1e2d45" strokeWidth="1" strokeDasharray="3,3" />
        )}
        {/* Candles */}
        {data.map((d, i) => {
          const x = i * (W / data.length) + 1;
          const isGreen = d.c >= d.o;
          const color = isGreen ? '#00d68f' : '#ff4d6a';
          const top = py(Math.max(d.o, d.c));
          const bot = py(Math.min(d.o, d.c));
          const bodyH = Math.max(bot - top, 1);
          return (
            <g key={i}>
              <line x1={x + bw / 2} y1={py(d.h)} x2={x + bw / 2} y2={py(d.l)}
              stroke={color} strokeWidth="1" opacity="0.6" />
              <rect x={x} y={top} width={bw} height={bodyH}
              fill={color} rx="0.5" />
            </g>);

        })}
        {/* Price line */}
        <line x1="0" y1={py(84.98)} x2={W} y2={py(84.98)}
        stroke="#4a9eff" strokeWidth="1" strokeDasharray="4,4" opacity="0.5" />
      </svg>
      {/* Price label */}
      <div style={{ position: 'absolute', right: 6, top: py(84.98) / 130 * 150 - 8, background: '#4a9eff', color: '#fff',
        fontSize: 9, padding: '1px 5px', borderRadius: 2, fontFamily: 'var(--mono)', pointerEvents: 'none' }}>
        84.98
      </div>
    </div>);

}

// ── Dashboard tab ───────────────────────────────────────────
function TabDashboard() {
  return (
    <div>
      {/* Alert */}
      <div className="alert-banner">
        ⚠ impulse_aggressive_short · SL/IN 86.83 · SL 84.48 · MS 85.66
      </div>

      {/* Chart */}
      <MiniChart />

      {/* Sekcja setups — skrót */}
      <div className="sec-header">
        <span className="sec-title">Aktywne setups</span>
        <span className="sec-badge">4</span>
      </div>
      {[
      { id: 'SOL/BTC', kier: 'SHORT', typ: 'impulse_aggressive_short', w: 1, tps: 2, sl: '84.48', status: 'czeka' },
      { id: 'Algo1', kier: 'SHORT', typ: 'impulse_aggressive_short', w: 1, tps: 1, sl: '84.50', status: 'short' },
      { id: 'atm', kier: 'LONG', typ: 'range_support_long', w: 2, tps: 3, sl: '83.20', status: 'czeka' }].
      map((s, i) =>
      <div key={i} className="setup-card">
          <div className="setup-card-top">
            <div className="setup-card-row1">
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span className="setup-id">{s.id}</span>
                <span className={`kier-badge ${s.kier.toLowerCase()}`}>{s.kier}</span>
              </div>
              <span style={{ fontSize: 10, color: s.status === 'short' ? 'var(--red)' : 'var(--amber)', fontFamily: 'var(--mono)' }}>
                <span className="status-dot" style={{ background: s.status === 'short' ? 'var(--red)' : 'var(--amber)' }}></span>
                {s.status}
              </span>
            </div>
            <div className="setup-typ">{s.typ}</div>
          </div>
          <div className="setup-card-bottom">
            <div className="setup-stat">
              <div className="setup-stat-val">{s.w}</div>
              <div className="setup-stat-lbl">W</div>
            </div>
            <div className="setup-stat">
              <div className="setup-stat-val">{s.tps}</div>
              <div className="setup-stat-lbl">TPS</div>
            </div>
            <div className="setup-stat">
              <div className="setup-stat-val red">{s.sl}</div>
              <div className="setup-stat-lbl">SL</div>
            </div>
            <div className="setup-stat" style={{ display: 'flex', alignItems: 'center', justifyContent: 'flex-end' }}>
              <button className={`action-btn ${s.kier === 'LONG' ? 'green' : 'red'}`}>
                {s.kier === 'LONG' ? '▲ wejście' : '▼ wejście'}
              </button>
            </div>
          </div>
        </div>
      )}
      <div style={{ padding: '0 16px 8px', textAlign: 'right' }}>
        <span style={{ fontSize: 11, color: 'var(--blue)', cursor: 'pointer', fontFamily: 'var(--mono)' }}>
          → pokaż wszystkie 4
        </span>
      </div>
    </div>);

}

// ── Setups tab ──────────────────────────────────────────────
function TabSetups() {
  const setups = [
  { id: 'SOL/BTC', model: 'Algo1', kier: 'SHORT', typ: 'impulse_aggressive_short', w: 1, tps: 2, ms: 1, sl: '84.48', algoP: '86.27', wr: '5.56', wrMs: '6.6', status: 'czeka' },
  { id: 'Algo1', model: 'Algo1', kier: 'SHORT', typ: 'impulse_aggressive_short', w: 1, tps: 1, ms: 0, sl: '84.50', algoP: '86.27', wr: '5.56', wrMs: '6.6', status: 'short' },
  { id: 'atm', model: 'Algo2', kier: 'LONG', typ: 'range_support_long', w: 2, tps: 3, ms: 2, sl: '83.20', algoP: '84.18', wr: '1.06', wrMs: '3.27', status: 'czeka' },
  { id: '695c', model: 'Algo3', kier: 'SHORT', typ: 'shallow_tail', w: 1, tps: 2, ms: 1, sl: '85.45', algoP: '85.43', wr: '3.27', wrMs: '3.27', status: 'short' }];

  return (
    <div>
      <div className="sec-header">
        <span className="sec-title">Aktywne setups</span>
        <span className="sec-badge">{setups.length}</span>
      </div>
      {setups.map((s, i) =>
      <div key={i} className="setup-card">
          <div className="setup-card-top">
            <div className="setup-card-row1">
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <span className="setup-id">{s.id}</span>
                <span className={`kier-badge ${s.kier.toLowerCase()}`}>{s.kier}</span>
                <span style={{ fontSize: 10, color: 'var(--text3)', fontFamily: 'var(--mono)' }}>{s.model}</span>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
